<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>bodypipe — SAM2 falling sand (WebGPU)</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #111; overflow: hidden; font-family: monospace; display: flex; align-items: center; justify-content: center; height: 100vh; }
canvas { display: block; image-rendering: pixelated; image-rendering: crisp-edges; }
#info { position: fixed; top: 8px; left: 8px; color: #555; font-size: 11px; z-index: 10; pointer-events: none; }
#tuner {
  position: fixed; top: 8px; right: 8px; z-index: 30;
  background: rgba(0,0,0,0.85); color: #ccc; font-family: monospace;
  font-size: 11px; padding: 10px 14px; border-radius: 6px;
  display: none; min-width: 240px; max-height: 90vh; overflow-y: auto;
}
#tuner h3 { margin: 0 0 8px; color: #eee; font-size: 12px; }
#tuner label { display: flex; align-items: center; gap: 6px; margin: 3px 0; }
#tuner input[type=range] { flex: 1; height: 14px; accent-color: #888; }
#tuner .val { min-width: 42px; text-align: right; color: #aaa; font-size: 10px; }
#tuner .section { margin-top: 8px; padding-top: 6px; border-top: 1px solid #333; color: #888; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; }
#loading {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  display: flex; align-items: center; justify-content: center;
  color: #666; font-family: monospace; font-size: 14px; z-index: 100;
  background: #111;
}
#controls {
  position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%);
  display: flex; gap: 6px; z-index: 20; flex-wrap: wrap; justify-content: center;
}
#controls button {
  background: rgba(255,255,255,0.12); color: #ccc; border: 1px solid rgba(255,255,255,0.2);
  border-radius: 4px; padding: 6px 12px; font-family: monospace; font-size: 12px;
  cursor: pointer; touch-action: manipulation;
}
#controls button:active { background: rgba(255,255,255,0.25); }
#controls button.mode-active { background: rgba(100,180,140,0.3); border-color: rgba(100,180,140,0.5); }
#tuner .mat-row { display: flex; gap: 4px; flex-wrap: wrap; align-items: center; margin: 4px 0; }
#tuner .mat-row.dim button { opacity: 0.35; }
#tuner .mat-row button {
  background: rgba(255,255,255,0.08); color: #999; border: 1px solid rgba(255,255,255,0.12);
  border-radius: 4px; padding: 4px 8px; font-family: monospace; font-size: 11px;
  cursor: pointer; touch-action: manipulation; display: inline-flex; align-items: center; gap: 5px;
}
#tuner .mat-row button:active { background: rgba(255,255,255,0.2); }
#tuner .mat-row button.mat-active { color: #eee; border-color: rgba(255,255,255,0.4); background: rgba(255,255,255,0.15); }
#tuner .mat-row button.fill-active { color: #eee; border-color: rgba(100,180,140,0.5); background: rgba(100,180,140,0.25); }
#tuner .swatch { width: 10px; height: 10px; border-radius: 2px; display: inline-block; }
#tuner label.physics-export { border-left: 2px solid rgba(120,180,255,0.5); padding-left: 4px; }
#tuner label.physics-export .val { color: rgba(120,180,255,0.7); }
#tuner .physics-preset-btn {
  background: rgba(120,180,255,0.15); color: rgba(120,180,255,0.9); border: 1px solid rgba(120,180,255,0.3);
  border-radius: 4px; padding: 5px 10px; font-family: monospace; font-size: 11px;
  cursor: pointer; margin-top: 6px; width: 100%;
}
#tuner .physics-preset-btn:hover { background: rgba(120,180,255,0.25); }
#tuner .physics-hint { color: rgba(120,180,255,0.5); font-size: 9px; margin-top: 2px; }
/* Gallery */
#gallery {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: #111; z-index: 200; overflow-y: auto; padding: 20px; display: none;
}
#gallery.active { display: block; }
body.gallery-mode { overflow: auto; }
#gallery-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; padding: 0 4px; }
#gallery-header h1 { color: #ddd; font-size: 18px; font-weight: normal; }
#upload-btn {
  background: rgba(255,255,255,0.12); color: #ccc; border: 1px solid rgba(255,255,255,0.25);
  border-radius: 6px; padding: 10px 18px; font-family: monospace; font-size: 13px; cursor: pointer;
}
#gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 14px; }
.gallery-card {
  background: #1a1a1a; border-radius: 8px; overflow: hidden; cursor: pointer;
  transition: transform 0.15s; border: 1px solid rgba(255,255,255,0.08);
}
.gallery-card:active { transform: scale(0.97); }
.gallery-card .thumb { width: 100%; aspect-ratio: 3/4; object-fit: cover; display: block; background: #222; }
.gallery-card .thumb-placeholder { width: 100%; aspect-ratio: 3/4; background: #222; display: flex; align-items: center; justify-content: center; color: #555; font-size: 11px; }
.gallery-card .card-info { padding: 8px 10px; color: #aaa; font-size: 12px; }
.gallery-card .card-info .name { color: #ddd; margin-bottom: 3px; }
.gallery-card .card-info .meta { color: #666; font-size: 10px; }
.gallery-card.processing { cursor: default; opacity: 0.8; }
.card-progress { height: 3px; background: #333; margin: 6px 10px 0; border-radius: 2px; overflow: hidden; }
.card-progress-fill { height: 100%; background: #5a8; border-radius: 2px; transition: width 0.3s ease; }
#back-btn {
  position: fixed; top: 10px; right: 8px; z-index: 25;
  background: rgba(255,255,255,0.12); color: #ccc; border: 1px solid rgba(255,255,255,0.2);
  border-radius: 4px; padding: 6px 12px; font-family: monospace; font-size: 12px;
  cursor: pointer; display: none;
}
/* Upload modal */
#upload-modal {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.92); z-index: 300; display: none; align-items: center; justify-content: center; padding: 20px;
}
#upload-modal.active { display: flex; }
#upload-box { background: #1a1a1a; border-radius: 12px; padding: 24px; max-width: 400px; width: 100%; border: 1px solid rgba(255,255,255,0.1); }
#upload-box h2 { color: #ddd; font-size: 15px; font-weight: normal; margin-bottom: 16px; }
#drop-zone { border: 2px dashed rgba(255,255,255,0.2); border-radius: 8px; padding: 32px 16px; text-align: center; color: #666; font-size: 13px; margin-bottom: 14px; }
#drop-zone.dragover { border-color: #5a8; color: #5a8; }
#drop-zone input[type=file] { display: none; }
#drop-zone .browse-link { color: #7ab; text-decoration: underline; cursor: pointer; }
#upload-name { width: 100%; background: #222; border: 1px solid rgba(255,255,255,0.15); color: #ccc; font-family: monospace; font-size: 13px; padding: 8px 10px; border-radius: 6px; margin-bottom: 14px; }
#upload-actions { display: flex; gap: 10px; justify-content: flex-end; }
#upload-actions button { background: rgba(255,255,255,0.12); color: #ccc; border: 1px solid rgba(255,255,255,0.2); border-radius: 6px; padding: 10px 18px; font-family: monospace; font-size: 13px; cursor: pointer; }
#upload-actions .submit-btn { background: #2a4a3a; border-color: #3a6a4a; color: #8d8; }
#upload-actions .submit-btn:disabled { opacity: 0.4; cursor: default; }
#upload-status { color: #888; font-size: 12px; margin-top: 10px; display: none; }
#upload-progress-bar { height: 3px; background: #333; border-radius: 2px; margin-top: 8px; overflow: hidden; display: none; }
#upload-progress-fill { height: 100%; background: #5a8; border-radius: 2px; transition: width 0.2s ease; width: 0%; }
#gpu-badge { position: fixed; bottom: 10px; right: 10px; color: #4a8; font-size: 10px; font-family: monospace; z-index: 5; }
</style>
</head>
<body>
<!-- Gallery view -->
<div id="gallery">
  <div id="gallery-header">
    <h1>bodypipe (WebGPU)</h1>
    <button id="upload-btn" onclick="openUpload()">+ upload</button>
  </div>
  <div id="gallery-grid"></div>
</div>
<!-- Upload modal -->
<div id="upload-modal">
  <div id="upload-box">
    <h2>upload video</h2>
    <div id="drop-zone">
      <div>drop a video here</div>
      <div style="margin-top:8px">or <span class="browse-link" onclick="document.getElementById('file-input').click()">browse files</span></div>
      <input type="file" id="file-input" accept="video/*">
    </div>
    <div id="selected-file" style="color:#888;font-size:12px;margin-bottom:10px;display:none"></div>
    <input type="text" id="upload-name" placeholder="name (optional)">
    <div id="upload-actions">
      <button onclick="closeUpload()">cancel</button>
      <button class="submit-btn" id="submit-upload-btn" onclick="submitUpload()" disabled>upload + process</button>
    </div>
    <div id="upload-status"></div>
    <div id="upload-progress-bar"><div id="upload-progress-fill"></div></div>
  </div>
</div>
<!-- Simulation view -->
<div id="loading" style="display:none">loading masks...</div>
<div id="info"></div>
<div id="tuner"><h3>tuner</h3></div>
<canvas id="canvas" tabindex="0"></canvas>
<button id="back-btn" onclick="goToGallery()">gallery</button>
<div id="controls" style="display:none">
  <button onclick="playing=!playing">play/pause</button>
  <button onclick="stepFrame(-1)">&laquo;</button>
  <button onclick="stepFrame(1)">&raquo;</button>
  <button id="mode-in-btn" class="mode-active" onclick="toggleInside()">inside</button>
  <button id="mode-out-btn" onclick="toggleOutside()">outside</button>
  <button id="interact-btn" onclick="toggleInteract()">interact</button>
  <button onclick="toggleP('showMask')">mask</button>
  <button onclick="cycleVideoOpacity()">video</button>
  <button onclick="respawn()">respawn</button>
  <button onclick="toggleTuner()">tuner</button>
</div>
<div id="gpu-badge">WebGPU</div>

<script>
// ======================================================================
// bodypipe — WebGPU compute shader version (fully GPU-resident)
// Grid data NEVER leaves the GPU after initial upload.
// ======================================================================

const VIDEOS_BASE = '../research/videos/';
const API_BASE = '/api';
const params = new URLSearchParams(location.search);
const videoName = params.get('video');
const isGalleryMode = !videoName;

let MASK_DIR, VIDEO_DIR, TOTAL_FRAMES, FPS, MASK_W, MASK_H, CELL, GW, GH;

function setDefaults() {
  MASK_DIR = '../research/lieberman_masks/';
  VIDEO_DIR = '../research/lieberman_video_frames/';
  TOTAL_FRAMES = 300; FPS = 30;
  MASK_W = 720; MASK_H = 900; CELL = 4;
  GW = Math.floor(MASK_W / CELL);
  GH = Math.floor(MASK_H / CELL);
}

async function loadConfig() {
  const configUrl = VIDEOS_BASE + videoName + '/config.json';
  try {
    const resp = await fetch(configUrl);
    if (!resp.ok) throw new Error(resp.status);
    const cfg = await resp.json();
    MASK_DIR = VIDEOS_BASE + videoName + '/' + (cfg.maskDir || 'masks/');
    VIDEO_DIR = VIDEOS_BASE + videoName + '/' + (cfg.frameDir || 'frames/');
    TOTAL_FRAMES = cfg.totalFrames || 300;
    FPS = cfg.fps || 30;
    MASK_W = cfg.width || 720; MASK_H = cfg.height || 900;
    CELL = 4;
    GW = Math.floor(MASK_W / CELL);
    GH = Math.floor(MASK_H / CELL);
    initPersonState(cfg.numPersons || 1);
    document.title = `bodypipe — ${cfg.name || videoName} (WebGPU)`;
  } catch (e) {
    console.warn('No config.json, using defaults:', e);
    setDefaults();
  }
}
setDefaults();

// -- Material types --
const MAT = { EMPTY: 0, SAND: 1, WATER: 2, SMOKE: 3, FIRE: 4, LAVA: 5, POWDER: 6 };
let insideMat = MAT.SAND, outsideMat = MAT.SAND;
const MAT_NAMES = { 1: 'sand', 2: 'water', 3: 'smoke', 4: 'fire', 5: 'lava', 6: 'powder' };

// -- Fill mode --
let fillModeIn = 'static', fillModeOut = 'static';
let containerOut = true;
let interactMaterials = false;

// -- Color palettes --
const MAT_COLORS = {
  [MAT.SAND]:  { inside: [[232,220,200],[212,196,168],[221,208,184],[240,228,208]], outside: [[180,200,225],[160,178,205],[200,215,230],[145,168,200]] },
  [MAT.WATER]: { inside: [[40,110,230],[30,85,210],[55,130,250],[70,150,255]], outside: [[25,55,175],[18,42,155],[35,70,195],[45,65,185]] },
  [MAT.SMOKE]: { inside: [[145,140,155],[125,120,135],[165,160,175],[110,105,120]], outside: [[105,105,120],[85,85,100],[125,125,140],[95,95,110]] },
  [MAT.FIRE]:  { inside: [[255,130,25],[255,90,12],[255,170,45],[255,210,65]], outside: [[255,110,18],[255,70,8],[255,150,35],[245,190,55]] },
  [MAT.LAVA]:  { inside: [[205,65,12],[225,85,22],[185,45,8],[255,125,35]], outside: [[185,55,12],[205,75,18],[165,40,8],[235,105,28]] },
  [MAT.POWDER]:{ inside: [[244,240,232],[230,225,215],[250,246,238],[236,230,220]], outside: [[215,220,230],[200,208,220],[225,230,238],[205,212,225]] },
};

// -- Mode toggles --
let insideOn = true, outsideOn = false, mode = 'inside';
function deriveMode() { if (insideOn && outsideOn) return 'both'; if (insideOn) return 'inside'; if (outsideOn) return 'outside'; return 'none'; }
function toggleInside() { insideOn = !insideOn; mode = deriveMode(); updateModeButtons(); respawn(); updateMatButtons(); }
function toggleOutside() { outsideOn = !outsideOn; mode = deriveMode(); updateModeButtons(); respawn(); updateMatButtons(); }
function updateModeButtons() {
  const inBtn = document.getElementById('mode-in-btn');
  const outBtn = document.getElementById('mode-out-btn');
  if (inBtn) inBtn.classList.toggle('mode-active', insideOn);
  if (outBtn) outBtn.classList.toggle('mode-active', outsideOn);
}
function cycleMode() {
  if (insideOn && !outsideOn) { insideOn = false; outsideOn = true; }
  else if (!insideOn && outsideOn) { insideOn = true; outsideOn = true; }
  else { insideOn = true; outsideOn = false; }
  mode = deriveMode(); updateModeButtons(); respawn();
}

// -- Material picker (GPU-only: just respawn) --
function selectMat(side, mat) {
  if (side === 'inside') { insideMat = mat; }
  else { outsideMat = mat; }
  updateMatButtons();
  respawn();
}
function updateMatButtons() {
  const inRow = document.getElementById('mat-row-inside');
  const outRow = document.getElementById('mat-row-outside');
  if (!inRow || !outRow) return;
  inRow.querySelectorAll('button[data-mat]').forEach(b => b.classList.toggle('mat-active', parseInt(b.dataset.mat) === insideMat));
  outRow.querySelectorAll('button[data-mat]').forEach(b => b.classList.toggle('mat-active', parseInt(b.dataset.mat) === outsideMat));
  inRow.classList.toggle('dim', !insideOn);
  outRow.classList.toggle('dim', !outsideOn);
  const fillInRow = document.getElementById('fill-row-inside');
  const fillOutRow = document.getElementById('fill-row-outside');
  if (fillInRow) { fillInRow.querySelectorAll('button[data-fill]').forEach(b => b.classList.toggle('fill-active', b.dataset.fill === fillModeIn)); fillInRow.classList.toggle('dim', !insideOn); }
  if (fillOutRow) { fillOutRow.querySelectorAll('button[data-fill]').forEach(b => b.classList.toggle('fill-active', b.dataset.fill === fillModeOut)); fillOutRow.classList.toggle('dim', !outsideOn); }
  const containerBtn = document.getElementById('container-out-btn');
  if (containerBtn) { containerBtn.classList.toggle('fill-active', containerOut); containerBtn.classList.toggle('dim', !outsideOn); }
}
function setFillMode(side, m) { if (side === 'inside') fillModeIn = m; else fillModeOut = m; respawn(); }
function toggleContainer() { containerOut = !containerOut; updateMatButtons(); respawn(); }
function toggleInteract() { interactMaterials = !interactMaterials; const btn = document.getElementById('interact-btn'); if (btn) btn.classList.toggle('mode-active', interactMaterials); }

// -- Tunable params --
const P = {
  fillPctIn:    { val: 0.70, min: 0.0,  max: 1.0,  step: 0.05, label: 'inside fill %' },
  fillPctOut:   { val: 0.70, min: 0.0,  max: 1.0,  step: 0.05, label: 'outside fill %' },
  rainRate:     { val: 0.30, min: 0.0,  max: 1.0,  step: 0.02, label: 'rain rate' },
  cellSize:     { val: 4,    min: 1,    max: 8,    step: 1,    label: 'grain size' },
  itersIn:      { val: 2,    min: 1,    max: 12,   step: 1,    label: 'physics iters (inside)' },
  itersOut:     { val: 6,    min: 1,    max: 12,   step: 1,    label: 'physics iters (outside)' },
  playSpeed:    { val: 1.0,  min: 0.1,  max: 3.0,  step: 0.1,  label: 'play speed' },
  inertia:      { val: 0.8,  min: 0.0,  max: 2.0,  step: 0.05, label: 'inertia' },
  inertiaDamp:  { val: 0.85, min: 0.5,  max: 0.99, step: 0.01, label: 'inertia damp' },
  groundPlane:  { val: 0.95, min: 0.3,  max: 1.0,  step: 0.01, label: 'ground plane' },
  spin:         { val: 1.0,  min: 0.0,  max: 3.0,  step: 0.1,  label: 'spin force' },
  reactRate:    { val: 0.40, min: 0.0,  max: 1.0,  step: 0.02, label: 'react rate' },
  gravityIn:    { val: 1.0,  min: 0.0,  max: 1.0,  step: 0.05, label: 'gravity (inside)' },
  gravityOut:   { val: 1.0,  min: 0.0,  max: 1.0,  step: 0.05, label: 'gravity (outside)' },
  splashIn:     { val: 1.0,  min: 0.0,  max: 5.0,  step: 0.1,  label: 'splash (inside)' },
  splashOut:    { val: 1.0,  min: 0.0,  max: 5.0,  step: 0.1,  label: 'splash (outside)' },
  showMask:     { val: 0,    min: 0,    max: 1,    step: 1,    label: 'show mask' },
  videoOpacity: { val: 0.0,  min: 0.0,  max: 1.0,  step: 0.05, label: 'video opacity' },
  trailLen:     { val: 0.0,  min: 0.0,  max: 1.0,   step: 0.01,  label: 'trail length' },
  fxZoom:       { val: 0.0,  min: -0.02, max: 0.02, step: 0.001, label: 'feedback zoom' },
  fxTwirl:      { val: 0.0,  min: -0.05, max: 0.05, step: 0.002, label: 'twirl' },
  fxChromaAb:   { val: 0.0,  min: 0.0,   max: 0.02, step: 0.0005, label: 'chromatic aberration' },
  fxChromaTrails: { val: 0.0, min: 0.0,  max: 0.15, step: 0.005, label: 'chromatic trails' },
};

// -- State --
let fullMasks = [], gridMasks = [], videoFrames = [];
let gpuAllMasksBuf = null; // All masks pre-uploaded to GPU
let precomputedCentroids = null; // [person][frame*2+0/1] = cx/cy
let precomputedOrientations = null; // [person][frame] = orientation
// Packed grid: each u32 has bits 0-7 = material, bits 8-9 = color variant, bits 10-25 = life
let gridIn = null, gridOut = null;
let currentFrame = 0, prevFrame = -1, playing = true;
let frameAccum = 0, lastTime = 0, showTuner = false;
let bodyVelX = 0, bodyVelY = 0, bodyAngularVel = 0;
let prevOrientation = null, bodyCx = 0, bodyCy = 0;
let lastVideoOpacity = 0.5;
let gpuNeedsUpload = false;
let frameJustChanged = false, shiftX = 0, shiftY = 0;

// -- Multi-person state --
let numPersons = 1;
let personState = []; // [{bodyCx, bodyCy, bodyVelX, bodyVelY, bodyAngularVel, prevOrientation, shiftX, shiftY}]
let gridsIn = [];     // per-person CPU grids (Uint32Array each)
function initPersonState(n) {
  numPersons = n;
  personState = [];
  gridsIn = [];
  for (let i = 0; i < n; i++) {
    personState.push({ bodyCx: 0, bodyCy: 0, bodyVelX: 0, bodyVelY: 0, bodyAngularVel: 0, prevOrientation: null, shiftX: 0, shiftY: 0 });
    gridsIn.push(null);
  }
}
initPersonState(1);

// -- Physics extraction API --
window.sandpipePhysics = {
  loadBalance: 0.5, weightCenterY: 0.5,
  sandCoM: { x: 0, y: 0 },
  insideLeft: 0, insideRight: 0, insideTotal: 0,
  insideBottomQuarter: 0, insideTopQuarter: 0,
  contactTop: 0, contactBottom: 0, contactLeft: 0, contactRight: 0,
  outsideTotal: 0,
  bodyVelX: 0, bodyVelY: 0, bodyAngularVel: 0,
  bodyCx: 0, bodyCy: 0,
  isSettled: false, leanDirection: 0,
};
let prevWeightCenterY = 0.5;

// -- Physics recording (for export to bodypipe) --
let physicsRecord = null;
let physicsRecordCount = 0;
let physicsExporting = false;
let bakeInProgress = false;

function recordPhysicsFrame(frameIdx) {
  if (!physicsRecord) { physicsRecord = new Array(TOTAL_FRAMES).fill(null); physicsRecordCount = 0; }
  if (frameIdx < 0 || frameIdx >= TOTAL_FRAMES) return;
  const sp = window.sandpipePhysics;
  if (!physicsRecord[frameIdx]) physicsRecordCount++;
  const record = {
    frame: frameIdx,
    loadBalance: sp.loadBalance, weightCenterY: sp.weightCenterY,
    sandCoM: { x: sp.sandCoM.x, y: sp.sandCoM.y },
    insideLeft: sp.insideLeft, insideRight: sp.insideRight, insideTotal: sp.insideTotal,
    insideBottomQuarter: sp.insideBottomQuarter, insideTopQuarter: sp.insideTopQuarter,
    contactTop: sp.contactTop, contactBottom: sp.contactBottom,
    contactLeft: sp.contactLeft, contactRight: sp.contactRight,
    outsideTotal: sp.outsideTotal,
    bodyVelX: sp.bodyVelX, bodyVelY: sp.bodyVelY, bodyAngularVel: sp.bodyAngularVel,
    bodyCx: sp.bodyCx, bodyCy: sp.bodyCy,
    isSettled: sp.isSettled, leanDirection: sp.leanDirection,
  };
  // Per-person data
  if (sp.persons && sp.persons.length > 1) {
    record.persons = sp.persons.map(p => ({ ...p }));
  }
  physicsRecord[frameIdx] = record;
}

function getSimParams() {
  return {
    mode, insideMat, outsideMat,
    insideMatName: MAT_NAMES[insideMat] || 'unknown',
    outsideMatName: MAT_NAMES[outsideMat] || 'unknown',
    fillModeIn, fillModeOut, cellSize: CELL,
    rainRate: P.rainRate.val, gravityIn: P.gravityIn.val, gravityOut: P.gravityOut.val,
    splashIn: P.splashIn.val, splashOut: P.splashOut.val,
    inertia: P.inertia.val, inertiaDamp: P.inertiaDamp.val,
    spin: P.spin.val, groundPlane: P.groundPlane.val,
    itersIn: P.itersIn.val, itersOut: P.itersOut.val,
    fillPctIn: P.fillPctIn.val, fillPctOut: P.fillPctOut.val,
    reactRate: P.reactRate.val,
  };
}

// Bake: step through every frame sequentially, run full GPU pipeline,
// read back stats — guarantees every frame is captured. No playback needed.
async function bakePhysics() {
  if (bakeInProgress) { console.warn('Bake already in progress'); return; }
  if (!gridMasks || gridMasks.length === 0) { console.warn('No masks loaded'); return; }
  bakeInProgress = true;
  const wasPlaying = playing;
  playing = false;
  const infoEl = document.getElementById('info');

  try {
    // Wait for any pending stats readback to finish
    while (statsReadbackBusy) await new Promise(r => setTimeout(r, 10));

    // Reset simulation state for clean bake
    respawn();
    await new Promise(r => setTimeout(r, 50)); // let respawn GPU ops settle

    physicsRecord = new Array(TOTAL_FRAMES).fill(null);
    physicsRecordCount = 0;

    const total = gridMasks.length;

    for (let f = 0; f < total; f++) {
      currentFrame = f;
      onFrameChange();

      // Run GPU physics (multiple iterations to let sand settle properly)
      const settleSteps = f === 0 ? 8 : 1;
      for (let s = 0; s < settleSteps; s++) {
        gpuFrame();
        await new Promise(r => setTimeout(r, 0)); // yield to GPU
      }

      // Force synchronous per-person stats readback
      device.queue.writeBuffer(gpuStatsBuf, 0, statsZerosMulti);
      const enc = device.createCommandEncoder();
      for (let p = 0; p < numPersons; p++) {
        device.queue.writeBuffer(gpuParamsBuf, 0, makeParamsBuf(0, gpuFrameSeed, p + 1));
        const pass = enc.beginComputePass();
        pass.setPipeline(reducePipeline);
        pass.setBindGroup(0, reduceBindGroupsPerPerson[p]);
        pass.dispatchWorkgroups(Math.ceil(GW / 8), Math.ceil(GH / 8));
        pass.end();
      }
      const totalStatsBytes = numPersons * statsSliceSize;
      enc.copyBufferToBuffer(gpuStatsBuf, 0, gpuStatsStagingBuf, 0, totalStatsBytes);
      device.queue.submit([enc.finish()]);

      await gpuStatsStagingBuf.mapAsync(GPUMapMode.READ);
      const allStats = new Uint32Array(gpuStatsStagingBuf.getMappedRange().slice(0));
      gpuStatsStagingBuf.unmap();

      // Person 0 stats for legacy API
      const s = allStats;
      const iTotal = s[4] || 1;
      const comX = s[2] / iTotal;
      const comY = s[3] / iTotal;
      const wcY = comY / (GH || 1);

      const sp = window.sandpipePhysics;
      sp.insideLeft = s[0]; sp.insideRight = s[1]; sp.insideTotal = s[4];
      sp.sandCoM.x = comX; sp.sandCoM.y = comY;
      sp.loadBalance = (s[0] + s[1]) > 0 ? s[1] / (s[0] + s[1]) : 0.5;
      sp.weightCenterY = wcY;
      sp.contactTop = s[5]; sp.contactBottom = s[6];
      sp.contactLeft = s[7]; sp.contactRight = s[8];
      sp.outsideTotal = s[9];
      sp.insideBottomQuarter = s[10]; sp.insideTopQuarter = s[11];
      sp.bodyVelX = bodyVelX; sp.bodyVelY = bodyVelY;
      sp.bodyAngularVel = bodyAngularVel;
      sp.bodyCx = bodyCx; sp.bodyCy = bodyCy;
      sp.isSettled = Math.abs(wcY - prevWeightCenterY) < 0.005;
      sp.leanDirection = sp.loadBalance < 0.4 ? -1 : sp.loadBalance > 0.6 ? 1 : 0;
      prevWeightCenterY = wcY;
      // Per-person stats for bake
      sp.persons = [];
      for (let p = 0; p < numPersons; p++) {
        const o = p * (statsSliceSize / 4);
        const ps = personState[p] || {};
        const pTotal = allStats[o + 4] || 1;
        sp.persons.push({
          insideLeft: allStats[o], insideRight: allStats[o + 1],
          insideTotal: allStats[o + 4],
          sandCoM: { x: allStats[o + 2] / pTotal, y: allStats[o + 3] / pTotal },
          loadBalance: (allStats[o] + allStats[o + 1]) > 0 ? allStats[o + 1] / (allStats[o] + allStats[o + 1]) : 0.5,
          weightCenterY: (allStats[o + 3] / pTotal) / (GH || 1),
          contactTop: allStats[o + 5], contactBottom: allStats[o + 6],
          contactLeft: allStats[o + 7], contactRight: allStats[o + 8],
          outsideTotal: allStats[o + 9],
          insideBottomQuarter: allStats[o + 10], insideTopQuarter: allStats[o + 11],
          bodyVelX: ps.bodyVelX || 0, bodyVelY: ps.bodyVelY || 0,
          bodyAngularVel: ps.bodyAngularVel || 0,
          bodyCx: ps.bodyCx || 0, bodyCy: ps.bodyCy || 0,
        });
      }

      recordPhysicsFrame(f);

      if (f % 10 === 0 || f === total - 1) {
        infoEl.textContent = `BAKING: ${f + 1}/${total} frames (${Math.round((f + 1) / total * 100)}%)`;
        await new Promise(r => setTimeout(r, 0)); // let UI update
      }
    }

    // Verify completeness
    let missing = [];
    for (let f = 0; f < total; f++) {
      if (!physicsRecord[f]) missing.push(f);
    }
    if (missing.length > 0) {
      console.error(`Bake incomplete! Missing ${missing.length} frames: ${missing.slice(0, 20).join(', ')}${missing.length > 20 ? '...' : ''}`);
    } else {
      console.log(`Bake complete: ${total}/${total} frames captured.`);
    }

    bakeInProgress = false;
    playing = wasPlaying;
    await exportPhysics();
  } catch (e) {
    console.error('Bake failed:', e);
    infoEl.textContent = `BAKE FAILED: ${e.message}`;
    bakeInProgress = false;
    playing = wasPlaying;
  }
}

async function exportPhysics() {
  if (physicsExporting) return;
  if (!physicsRecord || physicsRecordCount === 0) { console.warn('No physics data — press p to bake first'); return; }

  // Final completeness check
  let missing = 0;
  for (let f = 0; f < TOTAL_FRAMES; f++) { if (!physicsRecord[f]) missing++; }
  if (missing > 0) {
    console.warn(`Export has ${missing}/${TOTAL_FRAMES} missing frames — run bake (p) for a complete capture.`);
  }

  physicsExporting = true;
  const data = {
    fps: FPS, gridWidth: GW, gridHeight: GH, totalFrames: TOTAL_FRAMES,
    numPersons: numPersons,
    video: videoName, exportedAt: new Date().toISOString(),
    recordedFrames: physicsRecordCount, missingFrames: missing,
    simParams: getSimParams(),
    frames: physicsRecord,
  };
  if (videoName) {
    try {
      const resp = await fetch(`${API_BASE}/videos/${videoName}/physics`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data),
      });
      const result = await resp.json();
      console.log(`Physics saved to server: ${result.path} (${result.frames} frames)`);
      physicsExporting = false;
      return;
    } catch (e) { console.warn('Server save failed, falling back to download:', e); }
  }
  const blob = new Blob([JSON.stringify(data)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url;
  a.download = `sandpipe-physics-${videoName || 'unknown'}.json`;
  a.click(); URL.revokeObjectURL(url);
  console.log(`Downloaded ${physicsRecordCount}/${TOTAL_FRAMES} frames (${missing} missing)`);
  physicsExporting = false;
}

// -- Canvas --
const canvas = document.getElementById('canvas');

// -- Helper: pack/unpack cell --
function packCell(mat, variant, life) {
  return (mat & 0xFF) | ((variant & 0x3) << 8) | ((life & 0xFFFF) << 10);
}
function unpackMat(cell) { return cell & 0xFF; }
function unpackVariant(cell) { return (cell >> 8) & 0x3; }
function unpackLife(cell) { return (cell >> 10) & 0xFFFF; }

function resize() {
  const UI_BOTTOM = 60, TOP_PAD = 8;
  const scaleX = window.innerWidth / MASK_W;
  const scaleY = (window.innerHeight - UI_BOTTOM - TOP_PAD) / MASK_H;
  const scale = Math.min(scaleX, scaleY);
  canvas.width = Math.floor(MASK_W * scale);
  canvas.height = Math.floor(MASK_H * scale);
  canvas.style.width = canvas.width + 'px';
  canvas.style.height = canvas.height + 'px';
}
window.addEventListener('resize', resize);
resize();

let cellSizeChangeTimeout = null;
function onCellSizeChange(newCell) {
  clearTimeout(cellSizeChangeTimeout);
  cellSizeChangeTimeout = setTimeout(() => {
    CELL = Math.max(1, Math.min(8, Math.round(newCell)));
    GW = Math.floor(MASK_W / CELL); GH = Math.floor(MASK_H / CELL);
    gridMasks = fullMasks.map(m => downsample(m));
    rebuildPrecomputed();
    rebuildGpuMasks();
    resizeGPU();
    if (device) { createBuffers(); createPipelines(); }
    respawn();
  }, 200);
}
function rebuildPrecomputed() {
  // Per-person centroids and orientations
  precomputedCentroids = [];
  precomputedOrientations = [];
  for (let p = 0; p < numPersons; p++) {
    const pid = p + 1; // person ID in mask (1-based)
    const cents = new Float64Array(TOTAL_FRAMES * 2);
    const orients = new Float64Array(TOTAL_FRAMES);
    for (let f = 0; f < TOTAL_FRAMES; f++) {
      const gm = gridMasks[f];
      let cx = 0, cy = 0, cnt = 0;
      for (let y = 0; y < GH; y += 2) for (let x = 0; x < GW; x += 2) if (gm[y * GW + x] === pid) { cx += x; cy += y; cnt++; }
      if (cnt > 0) { cx /= cnt; cy /= cnt; } else { cx = GW / 2; cy = GH / 2; }
      cents[f * 2] = cx; cents[f * 2 + 1] = cy;
      let mu20 = 0, mu02 = 0, mu11 = 0;
      for (let y = 0; y < GH; y += 2) for (let x = 0; x < GW; x += 2) if (gm[y * GW + x] === pid) { const dx = x - cx, dy = y - cy; mu20 += dx * dx; mu02 += dy * dy; mu11 += dx * dy; }
      orients[f] = 0.5 * Math.atan2(2 * mu11, mu20 - mu02);
    }
    precomputedCentroids.push(cents);
    precomputedOrientations.push(orients);
  }
}
function rebuildGpuMasks() {
  if (!device) return;
  const cellCount = GW * GH;
  const totalBytes = TOTAL_FRAMES * cellCount * 4;
  // Guard: at very small CELL values the combined all-masks buffer can
  // exceed the adapter's max storage binding size. In that case we skip
  // the preload and fall back to per-frame CPU->GPU upload of just the
  // active mask (see onFrameChange).
  const maxBufSize = device.limits ? device.limits.maxStorageBufferBindingSize : 128 * 1024 * 1024;
  if (totalBytes > maxBufSize) {
    console.log(`all-masks preload skipped (${(totalBytes/1024/1024).toFixed(1)} MB > limit ${(maxBufSize/1024/1024).toFixed(1)} MB); using per-frame upload`);
    if (gpuAllMasksBuf) { gpuAllMasksBuf.destroy(); gpuAllMasksBuf = null; }
    return;
  }
  const allMasksData = new Uint32Array(TOTAL_FRAMES * cellCount);
  for (let f = 0; f < TOTAL_FRAMES; f++) { const gm = gridMasks[f]; const off = f * cellCount; for (let i = 0; i < cellCount; i++) allMasksData[off + i] = gm[i]; }
  try {
    if (gpuAllMasksBuf) gpuAllMasksBuf.destroy();
    const BUF = GPUBufferUsage;
    gpuAllMasksBuf = device.createBuffer({ size: allMasksData.byteLength, usage: BUF.STORAGE | BUF.COPY_SRC, mappedAtCreation: true });
    new Uint32Array(gpuAllMasksBuf.getMappedRange()).set(allMasksData);
    gpuAllMasksBuf.unmap();
  } catch (e) {
    console.warn('rebuildGpuMasks allocation failed, falling back to per-frame upload:', e);
    gpuAllMasksBuf = null;
  }
}

function downsample(mask) {
  const gm = new Uint8Array(GW * GH);
  const thresh = Math.max(1, Math.round(CELL * CELL * 0.5));
  for (let gy = 0; gy < GH; gy++) {
    for (let gx = 0; gx < GW; gx++) {
      // Majority vote: find the most common non-zero person ID in the block
      const counts = {}; // personId -> count
      let totalNonZero = 0;
      const mx0 = gx * CELL, my0 = gy * CELL;
      for (let dy = 0; dy < CELL; dy++) {
        for (let dx = 0; dx < CELL; dx++) {
          const mx = mx0 + dx, my = my0 + dy;
          if (mx < MASK_W && my < MASK_H) {
            const v = mask[my * MASK_W + mx];
            if (v > 0) { counts[v] = (counts[v] || 0) + 1; totalNonZero++; }
          }
        }
      }
      if (totalNonZero >= thresh) {
        // Pick the most common person ID
        let bestId = 0, bestCount = 0;
        for (const id in counts) { if (counts[id] > bestCount) { bestCount = counts[id]; bestId = parseInt(id); } }
        gm[gy * GW + gx] = bestId;
      }
    }
  }
  return gm;
}

async function loadMasks() {
  const loadingEl = document.getElementById('loading');
  loadingEl.textContent = 'fetching masks...';

  const offscreen = document.createElement('canvas');
  offscreen.width = MASK_W; offscreen.height = MASK_H;
  const octx = offscreen.getContext('2d', { willReadFrequently: true });

  fullMasks = new Array(TOTAL_FRAMES);
  gridMasks = new Array(TOTAL_FRAMES);

  // Fetch ALL mask PNGs in parallel
  const fetchPromises = [];
  for (let i = 0; i < TOTAL_FRAMES; i++) {
    const url = MASK_DIR + String(i).padStart(5, '0') + '.png';
    fetchPromises.push(fetch(url).then(r => r.ok ? r.blob() : null).catch(() => null));
  }
  const blobs = await Promise.all(fetchPromises);

  // Decode + extract pixels in batches
  const BATCH = 20;
  for (let start = 0; start < TOTAL_FRAMES; start += BATCH) {
    const end = Math.min(start + BATCH, TOTAL_FRAMES);
    const bitmapPromises = [];
    for (let i = start; i < end; i++) {
      if (blobs[i]) bitmapPromises.push(createImageBitmap(blobs[i]).then(bmp => ({ idx: i, bmp })));
      else bitmapPromises.push(Promise.resolve({ idx: i, bmp: null }));
    }
    const bitmaps = await Promise.all(bitmapPromises);
    for (const { idx, bmp } of bitmaps) {
      if (!bmp) { fullMasks[idx] = new Uint8Array(MASK_W * MASK_H); gridMasks[idx] = new Uint8Array(GW * GH); continue; }
      octx.clearRect(0, 0, MASK_W, MASK_H);
      octx.drawImage(bmp, 0, 0, MASK_W, MASK_H);
      bmp.close();
      const imgData = octx.getImageData(0, 0, MASK_W, MASK_H);
      const binary = new Uint8Array(MASK_W * MASK_H);
      // Multi-person: if numPersons > 1, raw pixel value IS the person ID (1-N).
      // Single-person (legacy): threshold 0/255 binary to 0/1.
      if (numPersons > 1) {
        for (let j = 0; j < binary.length; j++) binary[j] = imgData.data[j * 4];
      } else {
        for (let j = 0; j < binary.length; j++) binary[j] = imgData.data[j * 4] > 128 ? 1 : 0;
      }
      fullMasks[idx] = binary;
      gridMasks[idx] = downsample(binary);
    }
    loadingEl.textContent = `decoding masks... ${end}/${TOTAL_FRAMES}`;
    await new Promise(r => setTimeout(r, 0));
  }
  blobs.length = 0;

  // Upload ALL masks to one giant GPU buffer — no per-frame CPU→GPU transfer
  if (device) {
    loadingEl.textContent = 'uploading masks to GPU...';
    await new Promise(r => setTimeout(r, 0));
    const cellCount = GW * GH;
    const allMasksData = new Uint32Array(TOTAL_FRAMES * cellCount);
    for (let f = 0; f < TOTAL_FRAMES; f++) {
      const gm = gridMasks[f];
      const offset = f * cellCount;
      for (let i = 0; i < cellCount; i++) allMasksData[offset + i] = gm[i];
    }
    const BUF = GPUBufferUsage;
    gpuAllMasksBuf = device.createBuffer({ size: allMasksData.byteLength, usage: BUF.STORAGE | BUF.COPY_SRC, mappedAtCreation: true });
    new Uint32Array(gpuAllMasksBuf.getMappedRange()).set(allMasksData);
    gpuAllMasksBuf.unmap();
    console.log(`Uploaded ${TOTAL_FRAMES} masks to GPU (${(allMasksData.byteLength / 1024 / 1024).toFixed(1)} MB)`);
  }

  // Precompute all centroids + orientations — zero iteration at runtime
  loadingEl.textContent = 'precomputing motion...';
  await new Promise(r => setTimeout(r, 0));
  precomputedCentroids = new Float64Array(TOTAL_FRAMES * 2);
  precomputedOrientations = new Float64Array(TOTAL_FRAMES);
  for (let f = 0; f < TOTAL_FRAMES; f++) {
    const gm = gridMasks[f];
    let cx = 0, cy = 0, cnt = 0;
    for (let y = 0; y < GH; y += 2) {
      for (let x = 0; x < GW; x += 2) {
        if (gm[y * GW + x]) { cx += x; cy += y; cnt++; }
      }
    }
    if (cnt > 0) {
      cx /= cnt; cy /= cnt;
      precomputedCentroids[f * 2] = cx;
      precomputedCentroids[f * 2 + 1] = cy;
      let mu20 = 0, mu02 = 0, mu11 = 0;
      for (let y = 0; y < GH; y += 2) {
        for (let x = 0; x < GW; x += 2) {
          if (gm[y * GW + x]) {
            const dx = x - cx, dy = y - cy;
            mu20 += dx * dx; mu02 += dy * dy; mu11 += dx * dy;
          }
        }
      }
      precomputedOrientations[f] = 0.5 * Math.atan2(2 * mu11, mu20 - mu02);
    } else {
      precomputedCentroids[f * 2] = GW / 2;
      precomputedCentroids[f * 2 + 1] = GH / 2;
      precomputedOrientations[f] = 0;
    }
  }
  console.log(`Precomputed ${TOTAL_FRAMES} centroids + orientations`);

  // Video frame loads (non-blocking, for overlay)
  for (let i = 0; i < TOTAL_FRAMES; i++) {
    const img = new Image();
    img.src = VIDEO_DIR + String(i).padStart(5, '0') + '.jpg';
    videoFrames.push(img);
  }
  loadingEl.style.display = 'none';
  canvas.focus();
}

function gridCentroid(gmask, personId) {
  const pid = personId || 1;
  let cx = 0, cy = 0, cnt = 0;
  for (let y = 0; y < GH; y += 2) {
    for (let x = 0; x < GW; x += 2) {
      if (gmask[y * GW + x] === pid) { cx += x; cy += y; cnt++; }
    }
  }
  return cnt > 0 ? { x: cx / cnt, y: cy / cnt } : null;
}

function maskOrientation(gmask, cx, cy, personId) {
  const pid = personId || 1;
  let mu20 = 0, mu02 = 0, mu11 = 0;
  for (let y = 0; y < GH; y += 2) {
    for (let x = 0; x < GW; x += 2) {
      if (gmask[y * GW + x] === pid) {
        const dx = x - cx, dy = y - cy;
        mu20 += dx * dx; mu02 += dy * dy; mu11 += dx * dy;
      }
    }
  }
  return 0.5 * Math.atan2(2 * mu11, mu20 - mu02);
}

function groundRow() { return Math.floor(GH * P.groundPlane.val); }

function respawn() {
  const N = GW * GH;
  gridOut = new Uint32Array(N);
  const gmask = gridMasks[currentFrame];
  if (!gmask) return;
  const gpRow = groundRow();
  const startFillIn = fillModeIn === 'empty' ? 0 : P.fillPctIn.val;
  const startFillOut = fillModeOut === 'empty' ? 0 : P.fillPctOut.val;

  // Per-person inside grids
  gridsIn = [];
  for (let p = 0; p < numPersons; p++) {
    const grid = new Uint32Array(N);
    if ((mode === 'inside' || mode === 'both') && startFillIn > 0) {
      const pid = p + 1;
      const inside = [];
      for (let i = 0; i < gmask.length; i++) if (gmask[i] === pid) inside.push(i);
      shuffle(inside);
      const fill = Math.floor(inside.length * startFillIn);
      for (let i = 0; i < fill; i++) {
        const life = insideMat === MAT.FIRE ? ((Math.random()*15)|0) : insideMat === MAT.SMOKE ? ((Math.random()*20)|0) : 0;
        grid[inside[i]] = packCell(insideMat, (Math.random()*4)|0, life);
      }
    }
    gridsIn.push(grid);
  }
  gridIn = gridsIn[0]; // legacy alias for backward compat

  if ((mode === 'outside' || mode === 'both') && startFillOut > 0) {
    const effectiveGP = containerOut ? gpRow : GH;
    const outside = [];
    for (let y = 0; y < GH; y++) { if (y >= effectiveGP) continue; for (let x = 0; x < GW; x++) { const i = y * GW + x; if (gmask[i] === 0) outside.push(i); } }
    shuffle(outside);
    const fill = Math.floor(outside.length * startFillOut);
    for (let i = 0; i < fill; i++) {
      const life = outsideMat === MAT.FIRE ? ((Math.random()*15)|0) : outsideMat === MAT.SMOKE ? ((Math.random()*20)|0) : 0;
      gridOut[outside[i]] = packCell(outsideMat, (Math.random()*4)|0, life);
    }
  }
  prevFrame = currentFrame;
  // Reset per-person state
  for (let p = 0; p < numPersons; p++) {
    const ps = personState[p];
    ps.bodyVelX = 0; ps.bodyVelY = 0; ps.bodyAngularVel = 0; ps.prevOrientation = null;
  }
  bodyVelX = 0; bodyVelY = 0; bodyAngularVel = 0; prevOrientation = null;
  gpuNeedsUpload = true;
  updateMatButtons();
}

function shuffle(arr) { for (let i = arr.length - 1; i > 0; i--) { const j = (Math.random() * (i + 1)) | 0; const t = arr[i]; arr[i] = arr[j]; arr[j] = t; } }

function onFrameChange() {
  if (prevFrame < 0 || !precomputedCentroids || precomputedCentroids.length === 0) { prevFrame = currentFrame; return; }

  // Update per-person centroid/velocity/shift
  for (let p = 0; p < numPersons; p++) {
    const ps = personState[p];
    const cents = precomputedCentroids[p];
    const orients = precomputedOrientations[p];
    const c0x = cents[prevFrame * 2], c0y = cents[prevFrame * 2 + 1];
    const c1x = cents[currentFrame * 2], c1y = cents[currentFrame * 2 + 1];
    const rawDx = c1x - c0x, rawDy = c1y - c0y;
    ps.shiftX = Math.round(rawDx);
    ps.shiftY = Math.round(rawDy);
    ps.bodyVelX = ps.bodyVelX * P.inertiaDamp.val + (-rawDx) * P.inertia.val;
    ps.bodyVelY = ps.bodyVelY * P.inertiaDamp.val + (-rawDy) * P.inertia.val * 0.3;
    ps.bodyCx = c1x; ps.bodyCy = c1y;
    const theta = orients[currentFrame];
    if (ps.prevOrientation !== null) {
      let dTheta = theta - ps.prevOrientation;
      while (dTheta > Math.PI / 2) dTheta -= Math.PI;
      while (dTheta < -Math.PI / 2) dTheta += Math.PI;
      ps.bodyAngularVel = ps.bodyAngularVel * P.inertiaDamp.val + dTheta * P.spin.val;
    }
    ps.prevOrientation = theta;
  }
  // Set legacy globals from person 0 (for outside grid dispatch which uses shared velocity)
  const ps0 = personState[0];
  shiftX = ps0.shiftX; shiftY = ps0.shiftY;
  bodyVelX = ps0.bodyVelX; bodyVelY = ps0.bodyVelY;
  bodyCx = ps0.bodyCx; bodyCy = ps0.bodyCy;
  bodyAngularVel = ps0.bodyAngularVel;
  prevOrientation = ps0.prevOrientation;

  // Swap active mask. Fast path: GPU-to-GPU copy from preloaded all-masks.
  // Fallback path (fires when the all-masks buffer would exceed the
  // adapter limit, typically CELL=1): upload the current frame's mask
  // directly from the CPU via writeBuffer.
  if (device && gpuMaskBuf) {
    const cellCount = GW * GH;
    if (gpuAllMasksBuf) {
      const enc = device.createCommandEncoder();
      enc.copyBufferToBuffer(gpuAllMasksBuf, currentFrame * cellCount * 4, gpuMaskBuf, 0, cellCount * 4);
      device.queue.submit([enc.finish()]);
    } else {
      const gm = gridMasks[currentFrame];
      if (gm) {
        const buf = new Uint32Array(cellCount);
        for (let i = 0; i < cellCount; i++) buf[i] = gm[i];
        device.queue.writeBuffer(gpuMaskBuf, 0, buf);
      }
    }
  }

  frameJustChanged = true;
  prevFrame = currentFrame;
}

// WebGPU
// ======================================================================

let device, gpuContext, canvasFormat;
let gpuGridInA, gpuGridOutA, gpuGridTmp, gpuMaskBuf, gpuParamsBuf;
let personGridSliceSize = 0; // aligned size per person's grid in gpuGridInA
let statsSliceSize = 256;    // aligned size per person's stats in gpuStatsBuf
let statsZerosMulti = new Uint32Array(16); // resized in createBuffers

const WGSL_PHYSICS = `
struct Params {
  width: u32,
  height: u32,
  step_offset: u32,
  frame_seed: u32,
  body_vel_x: f32,
  body_vel_y: f32,
  body_angular_vel: f32,
  body_cx: f32,
  body_cy: f32,
  ground_row: u32,
  container_on: u32,
  spin_coeff: f32,
  inside_mat: u32,
  outside_mat: u32,
  is_inside: u32,
  pad0: u32,
  shift_x: i32,
  shift_y: i32,
  rain_rate: f32,
  rain_top: u32,
  rain_mat: u32,
  rain_mode: u32,
  gravity_in: f32,
  gravity_out: f32,
}

@group(0) @binding(0) var<uniform> params: Params;
@group(0) @binding(1) var<storage, read_write> grid: array<u32>;
@group(0) @binding(2) var<storage, read> mask: array<u32>;

fn pcg(v: u32) -> u32 {
  var s = v * 747796405u + 2891336453u;
  var w = ((s >> ((s >> 28u) + 4u)) ^ s) * 277803737u;
  return (w >> 22u) ^ w;
}

fn rand_f(seed: u32) -> f32 {
  return f32(seed) / 4294967295.0;
}

fn get_mat(cell: u32) -> u32 { return cell & 0xFFu; }

fn is_valid_inside(idx: u32) -> bool {
  return mask[idx] == params.is_inside;
}

fn is_valid_outside(idx: u32, y: u32) -> bool {
  if (mask[idx] != 0u) { return false; }
  if (params.container_on == 1u && y >= params.ground_row) { return false; }
  return true;
}

fn is_valid(idx: u32, y: u32) -> bool {
  if (params.is_inside > 0u) { return is_valid_inside(idx); }
  return is_valid_outside(idx, y);
}

fn does_fall(m: u32) -> bool { return m == 1u || m == 2u || m == 5u || m == 6u; }
fn does_rise(m: u32) -> bool { return m == 3u || m == 4u; }

// Density: higher = heavier. Lava > Water > Sand > Powder
fn density(m: u32) -> u32 {
  if (m == 5u) { return 4u; } // LAVA - heaviest
  if (m == 2u) { return 3u; } // WATER
  if (m == 1u) { return 2u; } // SAND
  if (m == 6u) { return 1u; } // POWDER - lightest
  return 0u;
}

// Fall speed: 1.0 = every tick, lower = slower
fn fall_rate(m: u32) -> f32 {
  if (m == 1u) { return 1.0; }  // SAND - fast
  if (m == 2u) { return 1.0; }  // WATER - fast
  if (m == 5u) { return 0.3; }  // LAVA - slow, viscous
  if (m == 6u) { return 0.35; } // POWDER - slow, floaty
  return 0.0;
}

// Diagonal fall probability (controls pile shape)
fn diag_rate(m: u32) -> f32 {
  if (m == 2u) { return 0.95; } // WATER - fills all gaps, levels out
  if (m == 1u) { return 0.7; }  // SAND - angle of repose, piles
  if (m == 6u) { return 0.2; }  // POWDER - drifts more than slides
  if (m == 5u) { return 0.12; } // LAVA - sticky, barely slides
  return 0.0;
}

// Horizontal spread rate
fn spread_rate(m: u32) -> f32 {
  if (m == 2u) { return 0.85; } // WATER - splashy, flows fast
  if (m == 3u) { return 0.6; }  // SMOKE - drifts
  if (m == 6u) { return 0.5; }  // POWDER - drifts like dust
  if (m == 4u) { return 0.4; }  // FIRE - some spread
  if (m == 1u) { return 0.08; } // SAND - piles stay put
  if (m == 5u) { return 0.04; } // LAVA - sticky, barely spreads
  return 0.0;
}

// Can material a sink through material b? (heavier displaces lighter)
fn can_sink(a: u32, b: u32) -> bool {
  if (a == b) { return false; }
  return density(a) > density(b);
}

@compute @workgroup_size(8, 8)
fn main(@builtin(global_invocation_id) id: vec3<u32>) {
  let bx = id.x;
  let by = id.y;
  let off = params.step_offset;
  let ox = bx * 2u + (off & 1u);
  let oy = by * 2u + ((off >> 1u) & 1u);

  if (ox + 1u >= params.width || oy + 1u >= params.height) { return; }

  let i0 = oy * params.width + ox;
  let i1 = oy * params.width + ox + 1u;
  let i2 = (oy + 1u) * params.width + ox;
  let i3 = (oy + 1u) * params.width + ox + 1u;

  var c = array<u32, 4>(grid[i0], grid[i1], grid[i2], grid[i3]);
  var seed = pcg(ox * 374761393u + oy * 668265263u + params.frame_seed + off * 1013904223u);

  let m0 = get_mat(c[0]); let m1 = get_mat(c[1]);
  let m2 = get_mat(c[2]); let m3 = get_mat(c[3]);

  let v0 = is_valid(i0, oy); let v1 = is_valid(i1, oy);
  let v2 = is_valid(i2, oy + 1u); let v3 = is_valid(i3, oy + 1u);

  var sw = array<bool, 4>(false, false, false, false);

  // -- Vertical gravity with per-material fall rate & density sorting --
  let g = select(params.gravity_out, params.gravity_in, params.is_inside == 1u);
  let f0 = does_fall(m0) && rand_f(pcg(seed + 1u)) < fall_rate(m0);
  let f1 = does_fall(m1) && rand_f(pcg(seed + 2u)) < fall_rate(m1);
  seed = pcg(seed);

  // Fall into empty OR sink through lighter material
  if (!sw[0] && !sw[2] && f0 && can_sink(m0, get_mat(c[2])) && v0 && v2 && rand_f(pcg(seed + 11u)) < g) {
    let tc = c[0]; c[0] = c[2]; c[2] = tc; sw[0] = true; sw[2] = true;
  }
  if (!sw[1] && !sw[3] && f1 && can_sink(m1, get_mat(c[3])) && v1 && v3 && rand_f(pcg(seed + 12u)) < g) {
    let tc = c[1]; c[1] = c[3]; c[3] = tc; sw[1] = true; sw[3] = true;
  }

  // -- Diagonal gravity with per-material pile angle --
  seed = pcg(seed);
  let diag_lr = rand_f(seed) > 0.5;
  if (diag_lr) {
    if (!sw[0] && !sw[3] && does_fall(get_mat(c[0])) && can_sink(get_mat(c[0]), get_mat(c[3])) && get_mat(c[2]) != 0u && v0 && v3
        && rand_f(pcg(seed + 13u)) < diag_rate(get_mat(c[0])) * g) {
      let tc = c[0]; c[0] = c[3]; c[3] = tc; sw[0] = true; sw[3] = true;
    }
    if (!sw[1] && !sw[2] && does_fall(get_mat(c[1])) && can_sink(get_mat(c[1]), get_mat(c[2])) && get_mat(c[3]) != 0u && v1 && v2
        && rand_f(pcg(seed + 14u)) < diag_rate(get_mat(c[1])) * g) {
      let tc = c[1]; c[1] = c[2]; c[2] = tc; sw[1] = true; sw[2] = true;
    }
  } else {
    if (!sw[1] && !sw[2] && does_fall(get_mat(c[1])) && can_sink(get_mat(c[1]), get_mat(c[2])) && get_mat(c[3]) != 0u && v1 && v2
        && rand_f(pcg(seed + 15u)) < diag_rate(get_mat(c[1])) * g) {
      let tc = c[1]; c[1] = c[2]; c[2] = tc; sw[1] = true; sw[2] = true;
    }
    if (!sw[0] && !sw[3] && does_fall(get_mat(c[0])) && can_sink(get_mat(c[0]), get_mat(c[3])) && get_mat(c[2]) != 0u && v0 && v3
        && rand_f(pcg(seed + 16u)) < diag_rate(get_mat(c[0])) * g) {
      let tc = c[0]; c[0] = c[3]; c[3] = tc; sw[0] = true; sw[3] = true;
    }
  }

  // -- Rising: SMOKE and FIRE (BL->TL, BR->TR) --
  seed = pcg(seed);
  let r2 = does_rise(get_mat(c[2])) && !(get_mat(c[2]) == 4u && rand_f(pcg(seed + 3u)) > 0.65);
  let r3 = does_rise(get_mat(c[3])) && !(get_mat(c[3]) == 4u && rand_f(pcg(seed + 4u)) > 0.65);

  if (!sw[2] && !sw[0] && r2 && get_mat(c[0]) == 0u && v2 && v0) {
    let tc = c[2]; c[2] = c[0]; c[0] = tc; sw[2] = true; sw[0] = true;
  }
  if (!sw[3] && !sw[1] && r3 && get_mat(c[1]) == 0u && v3 && v1) {
    let tc = c[3]; c[3] = c[1]; c[1] = tc; sw[3] = true; sw[1] = true;
  }

  // Diagonal rising
  if (!sw[2] && !sw[1] && does_rise(get_mat(c[2])) && get_mat(c[1]) == 0u && v2 && v1) {
    let tc = c[2]; c[2] = c[1]; c[1] = tc; sw[2] = true; sw[1] = true;
  }
  if (!sw[3] && !sw[0] && does_rise(get_mat(c[3])) && get_mat(c[0]) == 0u && v3 && v0) {
    let tc = c[3]; c[3] = c[0]; c[0] = tc; sw[3] = true; sw[0] = true;
  }

  // -- Powder buoyancy: occasionally rises like dust/flour --
  seed = pcg(seed);
  if (!sw[2] && !sw[0] && get_mat(c[2]) == 6u && get_mat(c[0]) == 0u && v2 && v0 && rand_f(pcg(seed + 30u)) < 0.10) {
    let tc = c[2]; c[2] = c[0]; c[0] = tc; sw[2] = true; sw[0] = true;
  }
  if (!sw[3] && !sw[1] && get_mat(c[3]) == 6u && get_mat(c[1]) == 0u && v3 && v1 && rand_f(pcg(seed + 31u)) < 0.10) {
    let tc = c[3]; c[3] = c[1]; c[1] = tc; sw[3] = true; sw[1] = true;
  }

  // -- Horizontal spread with per-material rate --
  seed = pcg(seed);
  let h_dir = rand_f(seed) > 0.5;
  if (h_dir) {
    if (!sw[0] && !sw[1] && get_mat(c[1]) == 0u && v0 && v1 && rand_f(pcg(seed + 5u)) < spread_rate(get_mat(c[0]))) {
      let tc = c[0]; c[0] = c[1]; c[1] = tc; sw[0] = true; sw[1] = true;
    }
    if (!sw[2] && !sw[3] && get_mat(c[3]) == 0u && v2 && v3 && rand_f(pcg(seed + 6u)) < spread_rate(get_mat(c[2]))) {
      let tc = c[2]; c[2] = c[3]; c[3] = tc; sw[2] = true; sw[3] = true;
    }
  } else {
    if (!sw[1] && !sw[0] && get_mat(c[0]) == 0u && v1 && v0 && rand_f(pcg(seed + 7u)) < spread_rate(get_mat(c[1]))) {
      let tc = c[1]; c[1] = c[0]; c[0] = tc; sw[1] = true; sw[0] = true;
    }
    if (!sw[3] && !sw[2] && get_mat(c[2]) == 0u && v3 && v2 && rand_f(pcg(seed + 8u)) < spread_rate(get_mat(c[3]))) {
      let tc = c[3]; c[3] = c[2]; c[2] = tc; sw[3] = true; sw[2] = true;
    }
  }

  grid[i0] = c[0]; grid[i1] = c[1]; grid[i2] = c[2]; grid[i3] = c[3];
}
`;

const WGSL_DRIFT = `
struct Params {
  width: u32, height: u32, step_offset: u32, frame_seed: u32,
  body_vel_x: f32, body_vel_y: f32, body_angular_vel: f32,
  body_cx: f32, body_cy: f32, ground_row: u32, container_on: u32,
  spin_coeff: f32, inside_mat: u32, outside_mat: u32, is_inside: u32, pad0: u32,
  shift_x: i32, shift_y: i32, rain_rate: f32, rain_top: u32, rain_mat: u32, rain_mode: u32,
  gravity_in: f32, gravity_out: f32,
  splash_in: f32, splash_out: f32,
}
@group(0) @binding(0) var<uniform> params: Params;
@group(0) @binding(1) var<storage, read_write> grid: array<u32>;
@group(0) @binding(2) var<storage, read> mask: array<u32>;

fn pcg(v: u32) -> u32 { var s = v * 747796405u + 2891336453u; var w = ((s >> ((s >> 28u) + 4u)) ^ s) * 277803737u; return (w >> 22u) ^ w; }
fn get_mat(cell: u32) -> u32 { return cell & 0xFFu; }

@compute @workgroup_size(8, 8)
fn main(@builtin(global_invocation_id) id: vec3<u32>) {
  let x = id.x; let y = id.y;
  if (x >= params.width || y >= params.height) { return; }
  let idx = y * params.width + x;
  let cell = grid[idx];
  if (get_mat(cell) == 0u) { return; }

  var vel_x = params.body_vel_x;
  if (params.is_inside == 0u) { vel_x = -vel_x; } // outside: pushed opposite

  let splash = select(params.splash_out, params.splash_in, params.is_inside > 0u);
  vel_x = vel_x * splash;

  let abs_vx = abs(vel_x);
  if (abs_vx < 0.3) { return; }

  let drift_prob = clamp(abs_vx * 0.15, 0.0, 1.0);
  let seed = pcg(x * 374761393u + y * 668265263u + params.frame_seed + 999u);
  let r = f32(seed) / 4294967295.0;
  if (r > drift_prob) { return; }

  var dir = 1i;
  if (vel_x < 0.0) { dir = -1i; }
  let nx = i32(x) + dir;
  if (nx < 0 || nx >= i32(params.width)) { return; }
  let nidx = y * params.width + u32(nx);

  // Check validity
  if (params.is_inside > 0u) {
    if (mask[nidx] != params.is_inside) { return; }
  } else {
    if (mask[nidx] != 0u) { return; }
    if (params.container_on == 1u && y >= params.ground_row) { return; }
  }
  if (get_mat(grid[nidx]) != 0u) { return; }

  // Swap
  grid[nidx] = cell;
  grid[idx] = 0u;
}
`;

const WGSL_CENTRIFUGAL = `
struct Params {
  width: u32, height: u32, step_offset: u32, frame_seed: u32,
  body_vel_x: f32, body_vel_y: f32, body_angular_vel: f32,
  body_cx: f32, body_cy: f32, ground_row: u32, container_on: u32,
  spin_coeff: f32, inside_mat: u32, outside_mat: u32, is_inside: u32, pad0: u32,
  shift_x: i32, shift_y: i32, rain_rate: f32, rain_top: u32, rain_mat: u32, rain_mode: u32,
  gravity_in: f32, gravity_out: f32,
  splash_in: f32, splash_out: f32,
}
@group(0) @binding(0) var<uniform> params: Params;
@group(0) @binding(1) var<storage, read_write> grid: array<u32>;
@group(0) @binding(2) var<storage, read> mask: array<u32>;

fn pcg(v: u32) -> u32 { var s = v * 747796405u + 2891336453u; var w = ((s >> ((s >> 28u) + 4u)) ^ s) * 277803737u; return (w >> 22u) ^ w; }
fn get_mat(cell: u32) -> u32 { return cell & 0xFFu; }

@compute @workgroup_size(8, 8)
fn main(@builtin(global_invocation_id) id: vec3<u32>) {
  let x = id.x; let y = id.y;
  if (x >= params.width || y >= params.height) { return; }
  let idx = y * params.width + x;
  let cell = grid[idx];
  if (get_mat(cell) == 0u) { return; }

  // Amplify angular velocity by splash BEFORE threshold check so splash
  // affects slow rotations too, not just fast ones that already passed.
  let av = abs(params.body_angular_vel) * params.splash_in;
  if (av < 0.05) { return; }

  let dx = f32(x) - params.body_cx;
  let dy = f32(y) - params.body_cy;
  let r2 = dx * dx + dy * dy;
  if (r2 < 4.0) { return; }

  let coeff = params.spin_coeff * params.splash_in;
  let push_prob = clamp(coeff * coeff * r2, 0.0, 1.0);
  let seed = pcg(x * 668265263u + y * 374761393u + params.frame_seed + 777u);
  let rnd = f32(seed) / 4294967295.0;
  if (rnd > push_prob) { return; }

  let r = sqrt(r2);
  let rdx = dx / r; let rdy = dy / r;
  let nxi = i32(x) + i32(round(rdx));
  let nyi = i32(y) + i32(round(rdy));
  if (nxi < 0 || nxi >= i32(params.width) || nyi < 0 || nyi >= i32(params.height)) { return; }
  let nidx = u32(nyi) * params.width + u32(nxi);

  if (mask[nidx] != params.is_inside) { return; }
  if (get_mat(grid[nidx]) != 0u) { return; }

  grid[nidx] = cell;
  grid[idx] = 0u;
}
`;

const WGSL_BOUNCE = `
struct Params {
  width: u32, height: u32, step_offset: u32, frame_seed: u32,
  body_vel_x: f32, body_vel_y: f32, body_angular_vel: f32,
  body_cx: f32, body_cy: f32, ground_row: u32, container_on: u32,
  spin_coeff: f32, inside_mat: u32, outside_mat: u32, is_inside: u32, pad0: u32,
  shift_x: i32, shift_y: i32, rain_rate: f32, rain_top: u32, rain_mat: u32, rain_mode: u32,
  gravity_in: f32, gravity_out: f32,
  splash_in: f32, splash_out: f32,
}
@group(0) @binding(0) var<uniform> params: Params;
@group(0) @binding(1) var<storage, read_write> grid: array<u32>;
@group(0) @binding(2) var<storage, read> mask: array<u32>;

fn pcg(v: u32) -> u32 { var s = v * 747796405u + 2891336453u; var w = ((s >> ((s >> 28u) + 4u)) ^ s) * 277803737u; return (w >> 22u) ^ w; }
fn get_mat(cell: u32) -> u32 { return cell & 0xFFu; }

// Outside-mode collision bounce: any outside particle whose cell BELOW is
// inside the body mask is "sitting on" the body's top surface. With a
// probability proportional to body speed + splash_out, it gets relaunched
// upward (with optional sideways tilt) like a rain droplet deflecting off
// an umbrella. Runs only when bound for outside-mode dispatch.
@compute @workgroup_size(8, 8)
fn main(@builtin(global_invocation_id) id: vec3<u32>) {
  let x = id.x; let y = id.y;
  if (x >= params.width || y >= params.height) { return; }
  let idx = y * params.width + x;
  let cell = grid[idx];
  if (get_mat(cell) == 0u) { return; }

  // Only meaningful for outside-mode grid; is_inside is set to 0 by caller.
  if (params.is_inside > 0u) { return; }

  // Must be outside the body (mask=0) -- no bouncing of particles already
  // inside the mask (there shouldn't be any in outside-grid, but guard).
  if (mask[idx] != 0u) { return; }

  // Must be sitting on the body surface: cell directly below is any person.
  if (y + 1u >= params.height) { return; }
  let below_idx = (y + 1u) * params.width + x;
  if (mask[below_idx] == 0u) { return; }

  // Bounce impulse proportional to body speed (both axes) + splash_out.
  let speed = length(vec2<f32>(params.body_vel_x, params.body_vel_y));
  let impulse = speed * params.splash_out;
  if (impulse < 0.3) { return; }
  let bounce_prob = clamp(impulse * 0.25, 0.0, 0.7);

  let seed = pcg(x * 374761393u + y * 668265263u + params.frame_seed + 31337u);
  if (f32(seed) / 4294967295.0 > bounce_prob) { return; }

  // Pick target: upward, with random horizontal tilt biased by body_vel_x
  // so droplets spray "with" the body's lateral motion.
  let seed2 = pcg(seed + 1u);
  let tilt_rand = i32(seed2 & 3u) - 1i;  // -1, 0, 1, 2 -> remap
  var tilt = 0i;
  if (tilt_rand == -1i) { tilt = -1i; }
  else if (tilt_rand == 1i) { tilt = 1i; }
  else if (tilt_rand == 2i) {
    // Bias with body_vel_x sign
    if (params.body_vel_x > 0.3) { tilt = 1i; }
    else if (params.body_vel_x < -0.3) { tilt = -1i; }
  }

  let tx = i32(x) + tilt;
  let ty = i32(y) - 1i;
  if (tx < 0 || tx >= i32(params.width) || ty < 0) { return; }
  let tidx = u32(ty) * params.width + u32(tx);

  // Target must be outside mask AND empty.
  if (mask[tidx] != 0u) { return; }
  if (get_mat(grid[tidx]) != 0u) { return; }

  // Bounce!
  grid[tidx] = cell;
  grid[idx] = 0u;
}
`;

  let mat = cell & 0xFFu;
  if (mat == 0u) { return; }

  let variant = (cell >> 8u) & 0x3u;
  var life = (cell >> 10u) & 0xFFFFu;
  let seed = pcg(x * 374761393u + y * 668265263u + params.frame_seed + life * 48271u);
  let rnd = f32(seed) / 4294967295.0;

  if (mat == 4u) { // FIRE
    life = life + 1u;
    let threshold = 22u + u32(rnd * 28.0);
    if (life > threshold) {
      let seed2 = pcg(seed + 1u);
      let r2 = f32(seed2) / 4294967295.0;
      if (r2 < 0.35) {
        // Fire -> smoke
        let new_variant = (pcg(seed + 2u) >> 16u) & 0x3u;
        grid[idx] = 3u | (new_variant << 8u);
      } else {
        grid[idx] = 0u;
      }
      return;
    }
    // Flicker color variant
    let new_variant = (pcg(seed + 3u) >> 16u) & 0x3u;
    grid[idx] = mat | (new_variant << 8u) | (life << 10u);
  } else if (mat == 3u) { // SMOKE
    life = life + 1u;
    let threshold = 55u + u32(rnd * 35.0);
    if (life > threshold) {
      grid[idx] = 0u;
      return;
    }
    grid[idx] = mat | (variant << 8u) | (life << 10u);
  }
}
`;

// -- NEW GPU-RESIDENT SHADERS --

const WGSL_DISPLACE = `
struct Params {
  width: u32, height: u32, step_offset: u32, frame_seed: u32,
  body_vel_x: f32, body_vel_y: f32, body_angular_vel: f32,
  body_cx: f32, body_cy: f32, ground_row: u32, container_on: u32,
  spin_coeff: f32, inside_mat: u32, outside_mat: u32, is_inside: u32, pad0: u32,
  shift_x: i32, shift_y: i32, rain_rate: f32, rain_top: u32, rain_mat: u32, rain_mode: u32,
}
@group(0) @binding(0) var<uniform> params: Params;
@group(0) @binding(1) var<storage, read_write> dst: array<u32>;
@group(0) @binding(2) var<storage, read> tmp: array<u32>;
@group(0) @binding(3) var<storage, read> mask: array<u32>;

fn get_mat(cell: u32) -> u32 { return cell & 0xFFu; }

@compute @workgroup_size(8, 8)
fn main(@builtin(global_invocation_id) id: vec3<u32>) {
  let x = id.x; let y = id.y;
  if (x >= params.width || y >= params.height) { return; }
  let idx = y * params.width + x;

  let sx = i32(x) - params.shift_x;
  let sy = i32(y) - params.shift_y;

  if (sx >= 0 && sx < i32(params.width) && sy >= 0 && sy < i32(params.height)) {
    let src_idx = u32(sy) * params.width + u32(sx);
    let cell = tmp[src_idx];
    if (get_mat(cell) != 0u) {
      // Preserve the shifted cell regardless of new-mask validity.
      // The spiral relocate pass that follows will pick up any grain
      // now sitting outside the new mask and find it a new empty home.
      dst[idx] = cell;
      return;
    }
  }
  dst[idx] = 0u;
}
`;

// ── GPU relocate: push invalid grains toward nearest valid cell via atomicCAS ──
// Run 8-16 iterations. Each pass, every invalid grain tries to move 1 cell toward
// the body centroid. atomicCompareExchangeWeak prevents collisions.
const WGSL_RELOCATE = `
struct Params {
  width: u32, height: u32, step_offset: u32, frame_seed: u32,
  body_vel_x: f32, body_vel_y: f32, body_angular_vel: f32,
  body_cx: f32, body_cy: f32, ground_row: u32, container_on: u32,
  spin_coeff: f32, inside_mat: u32, outside_mat: u32, is_inside: u32, pad0: u32,
  shift_x: i32, shift_y: i32, rain_rate: f32, rain_top: u32, rain_mat: u32, rain_mode: u32,
}
@group(0) @binding(0) var<uniform> params: Params;
@group(0) @binding(1) var<storage, read_write> grid: array<atomic<u32>>;
@group(0) @binding(2) var<storage, read> mask: array<u32>;

fn pcg(v: u32) -> u32 { var s = v * 747796405u + 2891336453u; var w = ((s >> ((s >> 28u) + 4u)) ^ s) * 277803737u; return (w >> 22u) ^ w; }

fn is_valid_pos(idx: u32, y: u32) -> bool {
  if (params.is_inside > 0u) { return mask[idx] == params.is_inside; }
  if (mask[idx] != 0u) { return false; }
  if (params.container_on == 1u && y >= params.ground_row) { return false; }
  return true;
}

@compute @workgroup_size(8, 8)
fn main(@builtin(global_invocation_id) id: vec3<u32>) {
  let x = id.x; let y = id.y;
  if (x >= params.width || y >= params.height) { return; }
  let idx = y * params.width + x;

  let cell = atomicLoad(&grid[idx]);
  if ((cell & 0xFFu) == 0u) { return; }
  if (is_valid_pos(idx, y)) { return; }

  // Spiral search outward for the NEAREST empty valid cell. Port of the
  // CPU nearestEmpty(). Each stranded grain walks rings r=1..max_r and
  // tries cells on the RING PERIMETER ONLY (8r cells per ring, not r^2).
  // At max_r=20 that's ~840 cells per stranded grain — tractable on GPU.
  let max_r = 40i;
  let xi = i32(x);
  let yi = i32(y);
  for (var r = 1i; r <= max_r; r++) {
    // Top (y = yi - r) and bottom (y = yi + r) edges: full x range [xi-r, xi+r]
    for (var dx = -r; dx <= r; dx++) {
      // top
      let tx = xi + dx; let ty = yi - r;
      if (tx >= 0 && tx < i32(params.width) && ty >= 0 && ty < i32(params.height)) {
        let tidx = u32(ty) * params.width + u32(tx);
        if (is_valid_pos(tidx, u32(ty))) {
          let result = atomicCompareExchangeWeak(&grid[tidx], 0u, cell);
          if (result.exchanged) { atomicStore(&grid[idx], 0u); return; }
        }
      }
      // bottom
      let bx = xi + dx; let by = yi + r;
      if (bx >= 0 && bx < i32(params.width) && by >= 0 && by < i32(params.height)) {
        let bidx = u32(by) * params.width + u32(bx);
        if (is_valid_pos(bidx, u32(by))) {
          let result = atomicCompareExchangeWeak(&grid[bidx], 0u, cell);
          if (result.exchanged) { atomicStore(&grid[idx], 0u); return; }
        }
      }
    }
    // Left (x = xi - r) and right (x = xi + r) edges: y range (xi-r+1..xi+r-1) to avoid re-checking corners
    for (var dy = -r + 1i; dy <= r - 1i; dy++) {
      let ly = yi + dy; let lx = xi - r;
      if (lx >= 0 && lx < i32(params.width) && ly >= 0 && ly < i32(params.height)) {
        let lidx = u32(ly) * params.width + u32(lx);
        if (is_valid_pos(lidx, u32(ly))) {
          let result = atomicCompareExchangeWeak(&grid[lidx], 0u, cell);
          if (result.exchanged) { atomicStore(&grid[idx], 0u); return; }
        }
      }
      let ry = yi + dy; let rx = xi + r;
      if (rx >= 0 && rx < i32(params.width) && ry >= 0 && ry < i32(params.height)) {
        let ridx = u32(ry) * params.width + u32(rx);
        if (is_valid_pos(ridx, u32(ry))) {
          let result = atomicCompareExchangeWeak(&grid[ridx], 0u, cell);
          if (result.exchanged) { atomicStore(&grid[idx], 0u); return; }
        }
      }
    }
  }
  // No home within max_r — grain stays put (next frame will try again).
}
`;

const WGSL_MASK_KILL = `
struct Params {
  width: u32, height: u32, step_offset: u32, frame_seed: u32,
  body_vel_x: f32, body_vel_y: f32, body_angular_vel: f32,
  body_cx: f32, body_cy: f32, ground_row: u32, container_on: u32,
  spin_coeff: f32, inside_mat: u32, outside_mat: u32, is_inside: u32, pad0: u32,
  shift_x: i32, shift_y: i32, rain_rate: f32, rain_top: u32, rain_mat: u32, rain_mode: u32,
}
@group(0) @binding(0) var<uniform> params: Params;
@group(0) @binding(1) var<storage, read_write> grid: array<u32>;
@group(0) @binding(2) var<storage, read> mask: array<u32>;

fn get_mat(cell: u32) -> u32 { return cell & 0xFFu; }

@compute @workgroup_size(8, 8)
fn main(@builtin(global_invocation_id) id: vec3<u32>) {
  let x = id.x; let y = id.y;
  if (x >= params.width || y >= params.height) { return; }
  let idx = y * params.width + x;
  let cell = grid[idx];
  if (get_mat(cell) == 0u) { return; }

  if (params.is_inside > 0u) {
    // Inside grid: kill grains not inside this person's mask
    if (mask[idx] != params.is_inside) { grid[idx] = 0u; }
  } else {
    // Outside grid: kill grains inside the mask
    if (mask[idx] != 0u) { grid[idx] = 0u; return; }
    // Kill grains below ground when container is on
    if (params.container_on == 1u && y >= params.ground_row) { grid[idx] = 0u; return; }
    // Kill bottom 2 rows when container is off (grains fall through)
    if (params.container_on == 0u && y >= params.height - 2u) { grid[idx] = 0u; }
  }
}
`;

const WGSL_RAIN = `
struct Params {
