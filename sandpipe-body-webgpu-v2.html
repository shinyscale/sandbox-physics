  body_cx: f32, body_cy: f32, ground_row: u32, container_on: u32,
  spin_coeff: f32, inside_mat: u32, outside_mat: u32, is_inside: u32, pad0: u32,
  shift_x: i32, shift_y: i32, rain_rate: f32, rain_top: u32, rain_mat: u32, rain_mode: u32,
}
@group(0) @binding(0) var<uniform> params: Params;
@group(0) @binding(1) var<storage, read_write> grid: array<u32>;
@group(0) @binding(2) var<storage, read> mask: array<u32>;

fn pcg(v: u32) -> u32 {
  var s = v * 747796405u + 2891336453u;
  var w = ((s >> ((s >> 28u) + 4u)) ^ s) * 277803737u;
  return (w >> 22u) ^ w;
}
fn get_mat(cell: u32) -> u32 { return cell & 0xFFu; }

@compute @workgroup_size(8, 8)
fn main(@builtin(global_invocation_id) id: vec3<u32>) {
  let x = id.x; let y = id.y;
  if (x >= params.width || y >= params.rain_top) { return; }
  let idx = y * params.width + x;

  // Check validity: inside mode needs mask==person_id, outside needs mask==0
  if (params.rain_mode > 0u) {
    if (mask[idx] != params.rain_mode) { return; }
  } else {
    if (mask[idx] != 0u) { return; }
  }

  // Only spawn into empty cells
  if (get_mat(grid[idx]) != 0u) { return; }

  // Probabilistic spawn using PCG hash
  let seed = pcg(x * 374761393u + y * 668265263u + params.frame_seed * 48271u + 12345u);
  let r = f32(seed) / 4294967295.0;
  if (r > params.rain_rate) { return; }

  // Pack cell: mat + random variant + life for fire/smoke
  let mat = params.rain_mat;
  let seed2 = pcg(seed + 1u);
  let variant = (seed2 >> 16u) & 0x3u;
  var life = 0u;
  if (mat == 4u) { life = (pcg(seed2 + 1u) >> 20u) % 15u; }   // FIRE
  else if (mat == 3u) { life = (pcg(seed2 + 2u) >> 20u) % 20u; } // SMOKE

  grid[idx] = mat | (variant << 8u) | (life << 10u);
}
`;

// -- Physics reduction shader: scans both grids and writes summary stats --
const WGSL_REDUCE = `
struct Params {
  width: u32, height: u32, step_offset: u32, frame_seed: u32,
  body_vel_x: f32, body_vel_y: f32, body_angular_vel: f32,
  body_cx: f32, body_cy: f32, ground_row: u32, container_on: u32,
  spin_coeff: f32, inside_mat: u32, outside_mat: u32, is_inside: u32, pad0: u32,
  shift_x: i32, shift_y: i32, rain_rate: f32, rain_top: u32, rain_mat: u32, rain_mode: u32,
}

@group(0) @binding(0) var<uniform> params: Params;
@group(0) @binding(1) var<storage, read> grid_in: array<u32>;
@group(0) @binding(2) var<storage, read> grid_out: array<u32>;
@group(0) @binding(3) var<storage, read> mask: array<u32>;
@group(0) @binding(4) var<storage, read_write> stats: array<atomic<u32>, 16>;

fn get_mat(cell: u32) -> u32 { return cell & 0xFFu; }

@compute @workgroup_size(8, 8)
fn main(@builtin(global_invocation_id) id: vec3<u32>) {
  let x = id.x;
  let y = id.y;
  if (x >= params.width || y >= params.height) { return; }

  let idx = y * params.width + x;
  let w = params.width;
  let h = params.height;

  // -- Inside grid analysis (for the person specified by params.is_inside) --
  let cell_in = grid_in[idx];
  let mat_in = get_mat(cell_in);
  if (mat_in != 0u && mask[idx] == params.is_inside) {
    atomicAdd(&stats[4], 1u); // inside_total

    let cx = u32(params.body_cx);
    if (x < cx) {
      atomicAdd(&stats[0], 1u); // inside_count_left
    } else {
      atomicAdd(&stats[1], 1u); // inside_count_right
    }

    atomicAdd(&stats[2], x); // inside_sum_x
    atomicAdd(&stats[3], y); // inside_sum_y

    let quarter_h = h / 4u;
    if (y >= h - quarter_h) {
      atomicAdd(&stats[10], 1u); // inside_bottom_quarter
    }
    if (y < quarter_h) {
      atomicAdd(&stats[11], 1u); // inside_top_quarter
    }
  }

  // -- Outside grid analysis --
  let cell_out = grid_out[idx];
  let mat_out = get_mat(cell_out);
  if (mat_out != 0u && mask[idx] == 0u) {
    atomicAdd(&stats[9], 1u); // outside_total

    // Contact detection: outside particle adjacent to this person's boundary
    var is_contact = false;
    if (x > 0u && mask[idx - 1u] == params.is_inside) { is_contact = true; }
    if (x + 1u < w && mask[idx + 1u] == params.is_inside) { is_contact = true; }
    if (y > 0u && mask[idx - w] == params.is_inside) { is_contact = true; }
    if (y + 1u < h && mask[idx + w] == params.is_inside) { is_contact = true; }

    if (is_contact) {
      let cy = u32(params.body_cy);
      let cx = u32(params.body_cx);
      if (y < cy) {
        atomicAdd(&stats[5], 1u); // outside_contact_top
      } else {
        atomicAdd(&stats[6], 1u); // outside_contact_bottom
      }
      if (x < cx) {
        atomicAdd(&stats[7], 1u); // outside_contact_left
      } else {
        atomicAdd(&stats[8], 1u); // outside_contact_right
      }
    }
  }
}
`;

const WGSL_RENDER = `
struct Params {
  width: u32, height: u32, step_offset: u32, frame_seed: u32,
  body_vel_x: f32, body_vel_y: f32, body_angular_vel: f32,
  body_cx: f32, body_cy: f32, ground_row: u32, container_on: u32,
  spin_coeff: f32, inside_mat: u32, outside_mat: u32, is_inside: u32, pad0: u32,
  shift_x: i32, shift_y: i32, rain_rate: f32, rain_top: u32, rain_mat: u32, rain_mode: u32,
}

@group(0) @binding(0) var<uniform> params: Params;
@group(0) @binding(1) var<storage, read> grid_in: array<u32>;
@group(0) @binding(2) var<storage, read> grid_out: array<u32>;
@group(0) @binding(3) var<storage, read> mask: array<u32>;
@group(0) @binding(4) var trailPrev: texture_2d<f32>;
@group(0) @binding(5) var trailSamp: sampler;

struct TrailParams {
  // per-channel retention: rgba multiplier applied to the sampled previous
  // trail frame. Default all equal to the trail-length slider; differ for
  // the "chromatic trails" effect (warm afterimages).
  retention: vec4<f32>,
  // VFX knobs: x = feedback-zoom delta (0 = no zoom, positive = zoom in),
  //           y = twirl angle per frame (radians),
  //           z = chromatic aberration (UV-space offset magnitude),
  //           w = reserved.
  fx: vec4<f32>,
}
@group(0) @binding(6) var<uniform> trailParams: TrailParams;

@vertex fn vs(@builtin(vertex_index) vi: u32) -> @builtin(position) vec4<f32> {
  var pos = array<vec2<f32>, 3>(vec2(-1.0, -1.0), vec2(3.0, -1.0), vec2(-1.0, 3.0));
  return vec4(pos[vi], 0.0, 1.0);
}

fn pcg(v: u32) -> u32 { var s = v * 747796405u + 2891336453u; var w = ((s >> ((s >> 28u) + 4u)) ^ s) * 277803737u; return (w >> 22u) ^ w; }

fn inside_color(mat: u32, variant: u32, x: u32, y: u32) -> vec3<f32> {
  let av = f32(pcg(x * 374761393u + y * 668265263u + params.frame_seed) & 255u) / 255.0;
  switch mat {
    case 1u { // sand
      let v = f32(variant);
      let base = vec3(0.91, 0.86, 0.78);
      return base + (v - 1.5) * 0.04;
    }
    case 2u { // water
      let v = f32(variant);
      return vec3(0.16 + v*0.04, 0.43 + v*0.06, 0.90 + v*0.03);
    }
    case 3u { // smoke
      let v = f32(variant);
      let base = 0.53 + v * 0.04;
      return vec3(base, base - 0.01, base + 0.02);
    }
    case 4u { // fire
      if (av < 0.3) { return vec3(1.0, 0.78 + av*0.2, 0.2 + av*0.2); }
      else if (av < 0.6) { return vec3(1.0, 0.39 + av*0.3, 0.04 + av*0.08); }
      else { return vec3(1.0, 0.24 + av*0.2, 0.02); }
    }
    case 5u { // lava
      if (av < 0.12) { return vec3(1.0, 0.49 + av*2.0, 0.14); }
      else { let v = f32(variant); return vec3(0.80 + v*0.04, 0.25 + v*0.03, 0.05); }
    }
    case 6u { // powder — pale cream, slight grain variation
      let v = f32(variant);
      let base = vec3(0.96, 0.94, 0.90);
      return base + (v - 1.5) * 0.02;
    }
    default { return vec3(0.0); }
  }
}

fn outside_color(mat: u32, variant: u32, x: u32, y: u32) -> vec3<f32> {
  let av = f32(pcg(x * 374761393u + y * 668265263u + params.frame_seed) & 255u) / 255.0;
  switch mat {
    case 1u { let v = f32(variant); return vec3(0.70 + v*0.04, 0.78 + v*0.03, 0.88 + v*0.02); }
    case 2u { let v = f32(variant); return vec3(0.10 + v*0.03, 0.22 + v*0.04, 0.69 + v*0.04); }
    case 3u { let v = f32(variant); let base = 0.39 + v * 0.04; return vec3(base, base, base + 0.03); }
    case 4u {
      if (av < 0.3) { return vec3(1.0, 0.74 + av*0.2, 0.18 + av*0.18); }
      else if (av < 0.6) { return vec3(1.0, 0.35 + av*0.27, 0.03 + av*0.07); }
      else { return vec3(0.96, 0.22 + av*0.2, 0.02); }
    }
    case 5u {
      if (av < 0.12) { return vec3(0.92, 0.41 + av*2.0, 0.11); }
      else { let v = f32(variant); return vec3(0.73 + v*0.04, 0.22 + v*0.03, 0.05); }
    }
    case 6u { // powder — cool pale in outside palette
      let v = f32(variant);
      let base = vec3(0.85, 0.88, 0.92);
      return base + (v - 1.5) * 0.02;
    }
    default { return vec3(0.0); }
  }
}

@fragment fn fs(@builtin(position) pos: vec4<f32>) -> @location(0) vec4<f32> {
  let canvas_w = f32(params.width);
  let canvas_h = f32(params.height);

  // textureSample must be called from uniform control flow in WGSL, so we
  // sample the trail texture BEFORE any pos-dependent branches.
  // Feedback-zoom + twirl: transform the source UV so the trail sample
  // comes from a slightly zoomed/rotated version of the previous frame.
  // Produces the hypnotic "tunnel into infinity" Geiss effect.
  let uv = pos.xy / vec2<f32>(canvas_w, canvas_h);
  let zoom = 1.0 + trailParams.fx.x;
  let ang = trailParams.fx.y;
  let cs = cos(ang);
  let sn = sin(ang);
  let off = (uv - vec2<f32>(0.5, 0.5)) * zoom;
  let rot = vec2<f32>(off.x * cs - off.y * sn, off.x * sn + off.y * cs);
  let src_uv = rot + vec2<f32>(0.5, 0.5);
  let prev = textureSample(trailPrev, trailSamp, src_uv);
  // Per-channel retention for "chromatic trails" (warm afterimages).
  let faded = prev * trailParams.retention;

  let gx = u32(pos.x);
  let gy = u32(pos.y);
  if (gx >= params.width || gy >= params.height) { return faded; }

  let idx = gy * params.width + gx;
  let m = mask[idx];
  let cell_count = params.width * params.height;

  // Inside-grid particles: mask > 0 means some person owns this cell.
  // Index into packed all-persons buffer: (person-1) * cell_count + idx.
  if (m > 0u) {
    let grid_offset = (m - 1u) * cell_count + idx;
    let cell_in = grid_in[grid_offset];
    let mat_in = cell_in & 0xFFu;
    if (mat_in != 0u) {
      let variant = (cell_in >> 8u) & 0x3u;
      var col = inside_color(mat_in, variant, gx, gy);
      // Per-person hue tint: person 1 = warm (original), 2+ = shifted
      if (m >= 2u) {
        let hue_shift = f32(m - 1u) * 0.33;
        col = vec3(
          col.r * (1.0 - hue_shift * 0.5) + col.b * hue_shift * 0.5,
          col.g,
          col.b * (1.0 - hue_shift * 0.5) + col.r * hue_shift * 0.5,
        );
      }
      return vec4(col, 1.0);
    }
  }

  // Outside-grid particles are only rendered where the mask is 0.
  if (m == 0u) {
    let cell_out = grid_out[idx];
    let mat_out = cell_out & 0xFFu;
    if (mat_out != 0u) {
      let variant = (cell_out >> 8u) & 0x3u;
      let col = outside_color(mat_out, variant, gx, gy);
      return vec4(col, 1.0);
    }
  }

  // No particle here -- return faded previous trail.
  return faded;
}
`;

const WGSL_PRESENT = `
struct TrailParams {
  retention: vec4<f32>,
  fx: vec4<f32>,  // x=zoom, y=twirl, z=chroma_ab, w=reserved
}
@group(0) @binding(0) var trailTex: texture_2d<f32>;
@group(0) @binding(1) var samp: sampler;
@group(0) @binding(2) var<uniform> trailParams: TrailParams;

@vertex fn vs(@builtin(vertex_index) vi: u32) -> @builtin(position) vec4<f32> {
  var p = array<vec2<f32>, 3>(vec2(-1.0, -1.0), vec2(3.0, -1.0), vec2(-1.0, 3.0));
  return vec4(p[vi], 0.0, 1.0);
}

@fragment fn fs(@builtin(position) pos: vec4<f32>) -> @location(0) vec4<f32> {
  let dims = vec2<f32>(textureDimensions(trailTex));
  let uv = pos.xy / dims;

  // Chromatic aberration: sample R/G/B channels at slightly offset UVs
  // along the radial direction from center. Offset magnitude = fx.z.
  let ca = trailParams.fx.z;
  let dir = uv - vec2<f32>(0.5, 0.5);
  let off = dir * ca;
  let r = textureSample(trailTex, samp, uv - off).r;
  let g = textureSample(trailTex, samp, uv).g;
  let b = textureSample(trailTex, samp, uv + off).b;
  let a = textureSample(trailTex, samp, uv).a;

  let bg = vec3<f32>(0.067, 0.067, 0.067);
  return vec4<f32>(mix(bg, vec3<f32>(r, g, b), a), 1.0);
}
`;

function raceTimeout(promise, ms) {
  return Promise.race([promise, new Promise((_, rej) => setTimeout(() => rej(new Error('timeout')), ms))]);
}

async function initGPU() {
  const badge = document.getElementById('gpu-badge');
  if (!navigator.gpu) {
    badge.textContent = 'WebGPU: not supported';
    return false;
  }

  // requestAdapter() hangs on some GPU/driver combos (Blackwell) -- try with timeout
  let adapter = null;
  for (const pref of ['high-performance', undefined, 'low-power']) {
    try {
      const opts = pref ? { powerPreference: pref } : {};
      adapter = await raceTimeout(navigator.gpu.requestAdapter(opts), 5000);
      if (adapter) break;
    } catch { /* timeout, try next */ }
  }
  if (!adapter) {
    badge.textContent = 'WebGPU: adapter timeout';
    console.warn('WebGPU requestAdapter() timed out');
    return false;
  }

  try {
    // At small CELL values the all-masks storage buffer can be several GB
    // (600 frames × MASK_W × MASK_H × 4 bytes). Default WebGPU limits cap
    // maxStorageBufferBindingSize at 128 MB, which blows up when grain
    // size < 3. Request whatever the adapter actually supports.
    const reqLimits = {};
    if (adapter.limits) {
      if (adapter.limits.maxBufferSize) reqLimits.maxBufferSize = adapter.limits.maxBufferSize;
      if (adapter.limits.maxStorageBufferBindingSize) reqLimits.maxStorageBufferBindingSize = adapter.limits.maxStorageBufferBindingSize;
    }
    device = await raceTimeout(adapter.requestDevice({ requiredLimits: reqLimits }), 5000);
    console.log('WebGPU device limits:', {
      maxBufferSize: device.limits.maxBufferSize,
      maxStorageBufferBindingSize: device.limits.maxStorageBufferBindingSize,
    });
  } catch (e) {
    badge.textContent = 'WebGPU: device timeout';
    console.warn('WebGPU requestDevice failed:', e);
    return false;
  }

  // Configure canvas for WebGPU
  gpuContext = canvas.getContext('webgpu');
  canvasFormat = navigator.gpu.getPreferredCanvasFormat();
  gpuContext.configure({ device, format: canvasFormat, alphaMode: 'premultiplied' });

  createBuffers();
  createPipelines();

  try {
    const info = adapter.info || {};
    document.getElementById('gpu-badge').textContent = 'WebGPU: ' + (info.device || info.description || 'active');
  } catch { document.getElementById('gpu-badge').textContent = 'WebGPU: active'; }
  gpuReady = true;
  return true;
}

function createBuffers() {
  const cellCount = GW * GH;
  const gridSize = cellCount * 4; // u32 per cell
  const BUF = GPUBufferUsage;
  const uniformSize = 256;

  // Per-person inside grids packed in one buffer (for offset binding)
  // Align each person's slice to minStorageBufferOffsetAlignment (256 bytes)
  const align = device.limits.minStorageBufferOffsetAlignment || 256;
  personGridSliceSize = Math.ceil(gridSize / align) * align;
  const totalInsideSize = numPersons * personGridSliceSize;
  gpuGridInA = device.createBuffer({ size: totalInsideSize, usage: BUF.STORAGE | BUF.COPY_DST | BUF.COPY_SRC });

  gpuGridOutA = device.createBuffer({ size: gridSize, usage: BUF.STORAGE | BUF.COPY_DST | BUF.COPY_SRC });
  gpuGridTmp = device.createBuffer({ size: gridSize, usage: BUF.STORAGE | BUF.COPY_DST | BUF.COPY_SRC });
  gpuMaskBuf = device.createBuffer({ size: cellCount * 4, usage: BUF.STORAGE | BUF.COPY_DST });
  gpuParamsBuf = device.createBuffer({ size: uniformSize, usage: BUF.UNIFORM | BUF.COPY_DST });
  // Per-person stats: 16 u32s = 64 bytes each, aligned to minStorageBufferOffsetAlignment
  statsSliceSize = Math.ceil(64 / align) * align; // 64 bytes padded to alignment
  const statsSize = Math.max(statsSliceSize, numPersons * statsSliceSize);
  gpuStatsBuf = device.createBuffer({ size: statsSize, usage: BUF.STORAGE | BUF.COPY_SRC | BUF.COPY_DST });
  gpuStatsStagingBuf = device.createBuffer({ size: statsSize, usage: BUF.MAP_READ | BUF.COPY_DST });
  statsZerosMulti = new Uint32Array(statsSize / 4);
}

function createPipelines() {
  // Compute layout: uniform + storage(rw) + storage(read)
  const computeLayout = device.createBindGroupLayout({ entries: [
    { binding: 0, visibility: GPUShaderStage.COMPUTE, buffer: { type: 'uniform' } },
    { binding: 1, visibility: GPUShaderStage.COMPUTE, buffer: { type: 'storage' } },
    { binding: 2, visibility: GPUShaderStage.COMPUTE, buffer: { type: 'read-only-storage' } },
  ]});

  // Displace layout: uniform + storage(rw) + read-only storage + read-only storage
  const displaceLayout = device.createBindGroupLayout({ entries: [
    { binding: 0, visibility: GPUShaderStage.COMPUTE, buffer: { type: 'uniform' } },
    { binding: 1, visibility: GPUShaderStage.COMPUTE, buffer: { type: 'storage' } },
    { binding: 2, visibility: GPUShaderStage.COMPUTE, buffer: { type: 'read-only-storage' } },
    { binding: 3, visibility: GPUShaderStage.COMPUTE, buffer: { type: 'read-only-storage' } },
  ]});

  // Render layout: uniform + 3 read-only storage
  const renderLayout = device.createBindGroupLayout({ entries: [
    { binding: 0, visibility: GPUShaderStage.FRAGMENT, buffer: { type: 'uniform' } },
    { binding: 1, visibility: GPUShaderStage.FRAGMENT, buffer: { type: 'read-only-storage' } },
    { binding: 2, visibility: GPUShaderStage.FRAGMENT, buffer: { type: 'read-only-storage' } },
    { binding: 3, visibility: GPUShaderStage.FRAGMENT, buffer: { type: 'read-only-storage' } },
    { binding: 4, visibility: GPUShaderStage.FRAGMENT, texture: { sampleType: 'float' } },
    { binding: 5, visibility: GPUShaderStage.FRAGMENT, sampler: { type: 'filtering' } },
    { binding: 6, visibility: GPUShaderStage.FRAGMENT, buffer: { type: 'uniform' } },
  ]});

  const presentLayout = device.createBindGroupLayout({ entries: [
    { binding: 0, visibility: GPUShaderStage.FRAGMENT, texture: { sampleType: 'float' } },
    { binding: 1, visibility: GPUShaderStage.FRAGMENT, sampler: { type: 'filtering' } },
    { binding: 2, visibility: GPUShaderStage.FRAGMENT, buffer: { type: 'uniform' } },
  ]});

  // Reduce layout: uniform + 3 read-only storage + 1 storage (stats atomic rw)
  const reduceLayout = device.createBindGroupLayout({ entries: [
    { binding: 0, visibility: GPUShaderStage.COMPUTE, buffer: { type: 'uniform' } },
    { binding: 1, visibility: GPUShaderStage.COMPUTE, buffer: { type: 'read-only-storage' } },
    { binding: 2, visibility: GPUShaderStage.COMPUTE, buffer: { type: 'read-only-storage' } },
    { binding: 3, visibility: GPUShaderStage.COMPUTE, buffer: { type: 'read-only-storage' } },
    { binding: 4, visibility: GPUShaderStage.COMPUTE, buffer: { type: 'storage' } },
  ]});

  const physicsModule = device.createShaderModule({ code: WGSL_PHYSICS });
  const driftModule = device.createShaderModule({ code: WGSL_DRIFT });
  const centrifugalModule = device.createShaderModule({ code: WGSL_CENTRIFUGAL });
  const lifeModule = device.createShaderModule({ code: WGSL_LIFE });
  const bounceModule = device.createShaderModule({ code: WGSL_BOUNCE });
  const displaceModule = device.createShaderModule({ code: WGSL_DISPLACE });
  const relocateModule = device.createShaderModule({ code: WGSL_RELOCATE });
  const maskKillModule = device.createShaderModule({ code: WGSL_MASK_KILL });
  const rainModule = device.createShaderModule({ code: WGSL_RAIN });
  const renderModule = device.createShaderModule({ code: WGSL_RENDER });

  const computePipelineLayout = device.createPipelineLayout({ bindGroupLayouts: [computeLayout] });
  const displacePipelineLayout = device.createPipelineLayout({ bindGroupLayouts: [displaceLayout] });

  physicsPipeline = device.createComputePipeline({ layout: computePipelineLayout, compute: { module: physicsModule, entryPoint: 'main' } });
  driftPipeline = device.createComputePipeline({ layout: computePipelineLayout, compute: { module: driftModule, entryPoint: 'main' } });
  centrifugalPipeline = device.createComputePipeline({ layout: computePipelineLayout, compute: { module: centrifugalModule, entryPoint: 'main' } });
  lifePipeline = device.createComputePipeline({ layout: computePipelineLayout, compute: { module: lifeModule, entryPoint: 'main' } });
  bouncePipeline = device.createComputePipeline({ layout: computePipelineLayout, compute: { module: bounceModule, entryPoint: 'main' } });
  displacePipeline = device.createComputePipeline({ layout: displacePipelineLayout, compute: { module: displaceModule, entryPoint: 'main' } });
  relocatePipeline = device.createComputePipeline({ layout: computePipelineLayout, compute: { module: relocateModule, entryPoint: 'main' } });
  maskKillPipeline = device.createComputePipeline({ layout: computePipelineLayout, compute: { module: maskKillModule, entryPoint: 'main' } });
  rainPipeline = device.createComputePipeline({ layout: computePipelineLayout, compute: { module: rainModule, entryPoint: 'main' } });

  const reduceModule = device.createShaderModule({ code: WGSL_REDUCE });
  const reducePipelineLayout = device.createPipelineLayout({ bindGroupLayouts: [reduceLayout] });
  reducePipeline = device.createComputePipeline({ layout: reducePipelineLayout, compute: { module: reduceModule, entryPoint: 'main' } });

  // Main render now targets the trail texture (rgba8unorm), not canvas.
  // The present pass is what writes to canvas.
  renderPipeline = device.createRenderPipeline({
    layout: device.createPipelineLayout({ bindGroupLayouts: [renderLayout] }),
    vertex: { module: renderModule, entryPoint: 'vs' },
    fragment: { module: renderModule, entryPoint: 'fs', targets: [{ format: 'rgba8unorm' }] },
    primitive: { topology: 'triangle-list' },
  });

  const presentModule = device.createShaderModule({ code: WGSL_PRESENT });
  presentPipeline = device.createRenderPipeline({
    layout: device.createPipelineLayout({ bindGroupLayouts: [presentLayout] }),
    vertex: { module: presentModule, entryPoint: 'vs' },
    fragment: { module: presentModule, entryPoint: 'fs', targets: [{ format: canvasFormat }] },
    primitive: { topology: 'triangle-list' },
  });

  // Trail sampler + uniform. TrailParams holds retention (per-channel)
  // and VFX knobs (feedback zoom, twirl, chromatic aberration). Two vec4s
  // = 32 bytes, std140-friendly 16B alignment.
  trailSampler = device.createSampler({ magFilter: 'linear', minFilter: 'linear' });
  trailParamsBuf = device.createBuffer({ size: 32, usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST });

  createTrailTextures();
  rebuildBindGroups();
}

function createTrailTextures() {
  if (!device) return;
  if (trailTexA) { try { trailTexA.destroy(); } catch {} }
  if (trailTexB) { try { trailTexB.destroy(); } catch {} }
  const usage = GPUTextureUsage.TEXTURE_BINDING | GPUTextureUsage.RENDER_ATTACHMENT;
  trailTexA = device.createTexture({ size: [GW, GH], format: 'rgba8unorm', usage });
  trailTexB = device.createTexture({ size: [GW, GH], format: 'rgba8unorm', usage });
  trailToggle = 0;
}

function rebuildBindGroups() {
  const computeLayout = physicsPipeline.getBindGroupLayout(0);
  const displLayout = displacePipeline.getBindGroupLayout(0);
  const cellCount = GW * GH;
  const gridSize = cellCount * 4;

  // Helper: create compute bind group for a person's inside grid slice
  function makeInsideBG(layout, personIdx) {
    return device.createBindGroup({ layout, entries: [
      { binding: 0, resource: { buffer: gpuParamsBuf } },
      { binding: 1, resource: { buffer: gpuGridInA, offset: personIdx * personGridSliceSize, size: gridSize } },
      { binding: 2, resource: { buffer: gpuMaskBuf } },
    ]});
  }

  // Per-person inside bind groups
  perPersonBindGroups = [];
  for (let p = 0; p < numPersons; p++) {
    perPersonBindGroups.push({
      physics: makeInsideBG(computeLayout, p),
      drift: makeInsideBG(computeLayout, p),
      centrifugal: makeInsideBG(computeLayout, p),
      life: makeInsideBG(computeLayout, p),
      maskKill: makeInsideBG(computeLayout, p),
      relocate: makeInsideBG(computeLayout, p),
      rain: makeInsideBG(computeLayout, p),
      displace: device.createBindGroup({ layout: displLayout, entries: [
        { binding: 0, resource: { buffer: gpuParamsBuf } },
        { binding: 1, resource: { buffer: gpuGridInA, offset: p * personGridSliceSize, size: gridSize } },
        { binding: 2, resource: { buffer: gpuGridTmp } },
        { binding: 3, resource: { buffer: gpuMaskBuf } },
      ]}),
    });
  }

  // Outside bind groups (shared, one set)
  physicsBindGroupsOut = device.createBindGroup({ layout: computeLayout, entries: [
    { binding: 0, resource: { buffer: gpuParamsBuf } },
    { binding: 1, resource: { buffer: gpuGridOutA } },
    { binding: 2, resource: { buffer: gpuMaskBuf } },
  ]});
  driftBindGroupOut = device.createBindGroup({ layout: computeLayout, entries: [
    { binding: 0, resource: { buffer: gpuParamsBuf } },
    { binding: 1, resource: { buffer: gpuGridOutA } },
    { binding: 2, resource: { buffer: gpuMaskBuf } },
  ]});
  lifeBindGroupOut = device.createBindGroup({ layout: computeLayout, entries: [
    { binding: 0, resource: { buffer: gpuParamsBuf } },
    { binding: 1, resource: { buffer: gpuGridOutA } },
    { binding: 2, resource: { buffer: gpuMaskBuf } },
  ]});
  bounceBindGroupOut = device.createBindGroup({ layout: computeLayout, entries: [
    { binding: 0, resource: { buffer: gpuParamsBuf } },
    { binding: 1, resource: { buffer: gpuGridOutA } },
    { binding: 2, resource: { buffer: gpuMaskBuf } },
  ]});
  displaceBindGroupOut = device.createBindGroup({ layout: displLayout, entries: [
    { binding: 0, resource: { buffer: gpuParamsBuf } },
    { binding: 1, resource: { buffer: gpuGridOutA } },
    { binding: 2, resource: { buffer: gpuGridTmp } },
    { binding: 3, resource: { buffer: gpuMaskBuf } },
  ]});
  maskKillBindGroupOut = device.createBindGroup({ layout: computeLayout, entries: [
    { binding: 0, resource: { buffer: gpuParamsBuf } },
    { binding: 1, resource: { buffer: gpuGridOutA } },
    { binding: 2, resource: { buffer: gpuMaskBuf } },
  ]});
  relocateBindGroupOut = device.createBindGroup({ layout: computeLayout, entries: [
    { binding: 0, resource: { buffer: gpuParamsBuf } },
    { binding: 1, resource: { buffer: gpuGridOutA } },
    { binding: 2, resource: { buffer: gpuMaskBuf } },
  ]});
  rainBindGroupOut = device.createBindGroup({ layout: computeLayout, entries: [
    { binding: 0, resource: { buffer: gpuParamsBuf } },
    { binding: 1, resource: { buffer: gpuGridOutA } },
    { binding: 2, resource: { buffer: gpuMaskBuf } },
  ]});

  // Per-person reduce bind groups (each writes to its own stats slice)
  reduceBindGroupsPerPerson = [];
  for (let p = 0; p < numPersons; p++) {
    reduceBindGroupsPerPerson.push(device.createBindGroup({
      layout: reducePipeline.getBindGroupLayout(0),
      entries: [
        { binding: 0, resource: { buffer: gpuParamsBuf } },
        { binding: 1, resource: { buffer: gpuGridInA, offset: p * personGridSliceSize, size: gridSize } },
        { binding: 2, resource: { buffer: gpuGridOutA } },
        { binding: 3, resource: { buffer: gpuMaskBuf } },
        { binding: 4, resource: { buffer: gpuStatsBuf, offset: p * statsSliceSize, size: 64 } },
      ],
    }));
  }

  // render bind group is created per-frame in gpuFrame() (ping-pong trail swap)
}

function uploadGridsToGPU() {
  // Upload mask — GPU copy if available, else CPU fallback
  if (gpuAllMasksBuf) {
    const cellCount = GW * GH;
    const enc = device.createCommandEncoder();
    enc.copyBufferToBuffer(gpuAllMasksBuf, currentFrame * cellCount * 4, gpuMaskBuf, 0, cellCount * 4);
    device.queue.submit([enc.finish()]);
  } else {
    const gmask = gridMasks[currentFrame];
    if (gmask) {
      const maskU32 = new Uint32Array(GW * GH);
      for (let i = 0; i < gmask.length; i++) maskU32[i] = gmask[i];
      device.queue.writeBuffer(gpuMaskBuf, 0, maskU32);
    }
  }
  // Upload per-person inside grids
  for (let p = 0; p < numPersons; p++) {
    if (gridsIn[p]) device.queue.writeBuffer(gpuGridInA, p * personGridSliceSize, gridsIn[p]);
  }
  if (gridOut) device.queue.writeBuffer(gpuGridOutA, 0, gridOut);
  gpuNeedsUpload = false;
}

// personId: 0 = outside, 1..N = person (1-based)
function makeParamsBuf(phase, seed, personId) {
  const buf = new ArrayBuffer(256);
  const u = new Uint32Array(buf); const f = new Float32Array(buf);
  const ii = new Int32Array(buf);
  // Use per-person state for inside, legacy globals for outside
  const ps = personId > 0 && personState[personId - 1] ? personState[personId - 1] : personState[0] || {};
  const pvx = ps.bodyVelX || bodyVelX;
  const pvy = ps.bodyVelY || bodyVelY;
  const pav = ps.bodyAngularVel || bodyAngularVel;
  const pcx = ps.bodyCx || bodyCx;
  const pcy = ps.bodyCy || bodyCy;
  const psx = ps.shiftX !== undefined ? ps.shiftX : shiftX;
  const psy = ps.shiftY !== undefined ? ps.shiftY : shiftY;
  u[0] = GW; u[1] = GH; u[2] = phase; u[3] = seed;
  f[4] = pvx; f[5] = pvy; f[6] = pav;
  f[7] = pcx; f[8] = pcy;
  u[9] = groundRow(); u[10] = containerOut ? 1 : 0;
  f[11] = Math.abs(pav) * 0.08;
  u[12] = insideMat; u[13] = outsideMat; u[14] = personId; u[15] = numPersons;
  ii[16] = psx; ii[17] = psy;
  f[18] = 0.0; u[19] = 0; u[20] = 0; u[21] = 0;
  f[22] = P.gravityIn.val;
  f[23] = P.gravityOut.val;
  f[24] = P.splashIn.val;
  f[25] = P.splashOut.val;
  return buf;
}

// personId: 0 = outside rain, 1..N = inside rain for person
function makeRainParamsBuf(seed, mat, personId, rateOverride) {
  const buf = new ArrayBuffer(256);
  const u = new Uint32Array(buf); const f = new Float32Array(buf);
  const ii = new Int32Array(buf);
  const ps = personId > 0 && personState[personId - 1] ? personState[personId - 1] : personState[0] || {};
  u[0] = GW; u[1] = GH; u[2] = 0; u[3] = seed;
  f[4] = ps.bodyVelX || bodyVelX; f[5] = ps.bodyVelY || bodyVelY; f[6] = ps.bodyAngularVel || bodyAngularVel;
  f[7] = ps.bodyCx || bodyCx; f[8] = ps.bodyCy || bodyCy;
  u[9] = groundRow(); u[10] = containerOut ? 1 : 0;
  f[11] = Math.abs(ps.bodyAngularVel || bodyAngularVel) * 0.08;
  u[12] = insideMat; u[13] = outsideMat; u[14] = personId; u[15] = numPersons;
  ii[16] = 0; ii[17] = 0;
  f[18] = rateOverride !== undefined ? rateOverride : (personId > 0 ? P.rainRate.val * 0.01 : P.rainRate.val * 0.02);
  u[19] = GH;
  u[20] = mat;
  u[21] = personId; // rain_mode = person ID (>0 for inside, 0 for outside)
  return buf;
}

function gpuFrame() {
  if (!gpuReady || !gridsIn[0] || !gridOut) return;

  // One-time upload after respawn
  if (gpuNeedsUpload) uploadGridsToGPU();

  const wgX = Math.ceil(GW / 16);
  const wgY = Math.ceil(GH / 16);
  const wgXFull = Math.ceil(GW / 8);
  const wgYFull = Math.ceil(GH / 8);
  const gridSize = GW * GH * 4;

  // -- Frame change: shift + relocate + (conditional) mask-kill --
  if (frameJustChanged) {
    frameJustChanged = false;
    const insideStatic = fillModeIn === 'static';
    const outsideStatic = fillModeOut === 'static';

    if (mode === 'inside' || mode === 'both') {
      // Per-person: displace, relocate, mask-kill
      for (let p = 0; p < numPersons; p++) {
        const pid = p + 1;
        const bg = perPersonBindGroups[p];
        const copyEnc = device.createCommandEncoder();
        copyEnc.copyBufferToBuffer(gpuGridInA, p * personGridSliceSize, gpuGridTmp, 0, gridSize);
        device.queue.submit([copyEnc.finish()]);

        device.queue.writeBuffer(gpuParamsBuf, 0, makeParamsBuf(0, gpuFrameSeed, pid));
        const dEnc = device.createCommandEncoder();
        const dPass = dEnc.beginComputePass();
        dPass.setPipeline(displacePipeline); dPass.setBindGroup(0, bg.displace); dPass.dispatchWorkgroups(wgXFull, wgYFull); dPass.end();
        device.queue.submit([dEnc.finish()]);

        for (let rp = 0; rp < 3; rp++) {
          device.queue.writeBuffer(gpuParamsBuf, 0, makeParamsBuf(0, gpuFrameSeed + rp, pid));
          const rEnc = device.createCommandEncoder();
          const rPass = rEnc.beginComputePass();
          rPass.setPipeline(relocatePipeline); rPass.setBindGroup(0, bg.relocate); rPass.dispatchWorkgroups(wgXFull, wgYFull); rPass.end();
          device.queue.submit([rEnc.finish()]);
        }

        if (!insideStatic) {
          device.queue.writeBuffer(gpuParamsBuf, 0, makeParamsBuf(0, gpuFrameSeed, pid));
          const mkEnc = device.createCommandEncoder();
          const mkPass = mkEnc.beginComputePass();
          mkPass.setPipeline(maskKillPipeline); mkPass.setBindGroup(0, bg.maskKill); mkPass.dispatchWorkgroups(wgXFull, wgYFull); mkPass.end();
          device.queue.submit([mkEnc.finish()]);
        }
      }
    }

    // Outside: no shift, just relocate + mask-kill
    if (mode === 'outside' || mode === 'both') {
      const RELOCATE_ITERS_OUT = outsideStatic ? 24 : 12;
      for (let r = 0; r < RELOCATE_ITERS_OUT; r++) {
        device.queue.writeBuffer(gpuParamsBuf, 0, makeParamsBuf(0, gpuFrameSeed + r, 0));
        const rEnc = device.createCommandEncoder();
        const rPass = rEnc.beginComputePass();
        rPass.setPipeline(relocatePipeline); rPass.setBindGroup(0, relocateBindGroupOut); rPass.dispatchWorkgroups(wgXFull, wgYFull); rPass.end();
        device.queue.submit([rEnc.finish()]);
      }
      if (!outsideStatic) {
        device.queue.writeBuffer(gpuParamsBuf, 0, makeParamsBuf(0, gpuFrameSeed, 0));
        const mkEnc = device.createCommandEncoder();
        const mkPass = mkEnc.beginComputePass();
        mkPass.setPipeline(maskKillPipeline); mkPass.setBindGroup(0, maskKillBindGroupOut); mkPass.dispatchWorkgroups(wgXFull, wgYFull); mkPass.end();
        device.queue.submit([mkEnc.finish()]);
      }
    }
  }

  // -- Physics iterations --
  const itersIn = P.itersIn.val;
  const itersOut = P.itersOut.val;

  if (mode === 'inside' || mode === 'both') {
    for (let p = 0; p < numPersons; p++) {
      const pid = p + 1;
      const bg = perPersonBindGroups[p];
      for (let iter = 0; iter < itersIn; iter++) {
        gpuFrameSeed++;
        for (let phase = 0; phase < 4; phase++) {
          device.queue.writeBuffer(gpuParamsBuf, 0, makeParamsBuf(phase, gpuFrameSeed + phase, pid));
          const enc = device.createCommandEncoder();
          const pass = enc.beginComputePass();
          pass.setPipeline(physicsPipeline); pass.setBindGroup(0, bg.physics); pass.dispatchWorkgroups(wgX, wgY); pass.end();
          device.queue.submit([enc.finish()]);
        }
      }
    }
  }

  if (mode === 'outside' || mode === 'both') {
    for (let iter = 0; iter < itersOut; iter++) {
      gpuFrameSeed++;
      for (let phase = 0; phase < 4; phase++) {
        device.queue.writeBuffer(gpuParamsBuf, 0, makeParamsBuf(phase, gpuFrameSeed + phase + 4, 0));
        const enc = device.createCommandEncoder();
        const pass = enc.beginComputePass();
        pass.setPipeline(physicsPipeline); pass.setBindGroup(0, physicsBindGroupsOut); pass.dispatchWorkgroups(wgX, wgY); pass.end();
        device.queue.submit([enc.finish()]);
      }
    }
  }

  // -- Post-physics: drift + centrifugal + life (per person) --
  if (mode === 'inside' || mode === 'both') {
    for (let p = 0; p < numPersons; p++) {
      const pid = p + 1;
      const bg = perPersonBindGroups[p];
      device.queue.writeBuffer(gpuParamsBuf, 0, makeParamsBuf(0, gpuFrameSeed, pid));
      const enc = device.createCommandEncoder();
      let cp;
      cp = enc.beginComputePass(); cp.setPipeline(driftPipeline); cp.setBindGroup(0, bg.drift); cp.dispatchWorkgroups(wgXFull, wgYFull); cp.end();
      cp = enc.beginComputePass(); cp.setPipeline(centrifugalPipeline); cp.setBindGroup(0, bg.centrifugal); cp.dispatchWorkgroups(wgXFull, wgYFull); cp.end();
      cp = enc.beginComputePass(); cp.setPipeline(lifePipeline); cp.setBindGroup(0, bg.life); cp.dispatchWorkgroups(wgXFull, wgYFull); cp.end();
      device.queue.submit([enc.finish()]);
    }
  }

  if (mode === 'outside' || mode === 'both') {
    device.queue.writeBuffer(gpuParamsBuf, 0, makeParamsBuf(0, gpuFrameSeed, 0));
    const enc = device.createCommandEncoder();
    let cp;
    cp = enc.beginComputePass(); cp.setPipeline(driftPipeline); cp.setBindGroup(0, driftBindGroupOut); cp.dispatchWorkgroups(wgXFull, wgYFull); cp.end();
    cp = enc.beginComputePass(); cp.setPipeline(bouncePipeline); cp.setBindGroup(0, bounceBindGroupOut); cp.dispatchWorkgroups(wgXFull, wgYFull); cp.end();
    cp = enc.beginComputePass(); cp.setPipeline(lifePipeline); cp.setBindGroup(0, lifeBindGroupOut); cp.dispatchWorkgroups(wgXFull, wgYFull); cp.end();
    device.queue.submit([enc.finish()]);
  }

  // -- Mask-kill outside every frame --
  if (mode === 'outside' || mode === 'both') {
    device.queue.writeBuffer(gpuParamsBuf, 0, makeParamsBuf(0, gpuFrameSeed, 0));
    const enc = device.createCommandEncoder();
    const pass = enc.beginComputePass();
    pass.setPipeline(maskKillPipeline); pass.setBindGroup(0, maskKillBindGroupOut); pass.dispatchWorkgroups(wgXFull, wgYFull); pass.end();
    device.queue.submit([enc.finish()]);
  }

  // -- Rain (per person + outside) --
  if (mode === 'inside' || mode === 'both') {
    const rate = (fillModeIn === 'empty' || fillModeIn === 'static') ? 0 : P.rainRate.val * 0.01;
    if (rate > 0) {
      for (let p = 0; p < numPersons; p++) {
        gpuFrameSeed++;
        device.queue.writeBuffer(gpuParamsBuf, 0, makeRainParamsBuf(gpuFrameSeed, insideMat, p + 1, rate));
        const enc = device.createCommandEncoder();
        const pass = enc.beginComputePass();
        pass.setPipeline(rainPipeline); pass.setBindGroup(0, perPersonBindGroups[p].rain); pass.dispatchWorkgroups(wgXFull, wgYFull); pass.end();
        device.queue.submit([enc.finish()]);
      }
    }
  }
  if (mode === 'outside' || mode === 'both') {
    const rate = (fillModeOut === 'empty' || fillModeOut === 'static') ? 0 : P.rainRate.val * 0.01;
    if (rate > 0) {
      gpuFrameSeed++;
      device.queue.writeBuffer(gpuParamsBuf, 0, makeRainParamsBuf(gpuFrameSeed, outsideMat, 0, rate));
      const enc = device.createCommandEncoder();
      const pass = enc.beginComputePass();
      pass.setPipeline(rainPipeline); pass.setBindGroup(0, rainBindGroupOut); pass.dispatchWorkgroups(wgXFull, wgYFull); pass.end();
      device.queue.submit([enc.finish()]);
    }
  }

  // -- Physics reduction: per-person stats --
  // Skip during bake — bake does its own synchronous readback
  if (!bakeInProgress) {
    const statsBytes = numPersons * 64;
    device.queue.writeBuffer(gpuStatsBuf, 0, statsZerosMulti);
    const rEnc = device.createCommandEncoder();
    for (let p = 0; p < numPersons; p++) {
      device.queue.writeBuffer(gpuParamsBuf, 0, makeParamsBuf(0, gpuFrameSeed, p + 1));
      const pass = rEnc.beginComputePass();
      pass.setPipeline(reducePipeline);
      pass.setBindGroup(0, reduceBindGroupsPerPerson[p]);
      pass.dispatchWorkgroups(Math.ceil(GW / 8), Math.ceil(GH / 8));
      pass.end();
    }
    const totalStatsBytes = numPersons * statsSliceSize;
    rEnc.copyBufferToBuffer(gpuStatsBuf, 0, gpuStatsStagingBuf, 0, totalStatsBytes);
    device.queue.submit([rEnc.finish()]);

    if (!statsReadbackBusy) {
      statsReadbackBusy = true;
      gpuStatsStagingBuf.mapAsync(GPUMapMode.READ).then(() => {
        const allStats = new Uint32Array(gpuStatsStagingBuf.getMappedRange().slice(0));
        gpuStatsStagingBuf.unmap();
        statsReadbackBusy = false;
        // Read person 0 stats into legacy window.sandpipePhysics (backward compat)
        const s = allStats; // person 0 starts at offset 0
        const total = s[4] || 1;
        const comX = s[2] / total;
        const comY = s[3] / total;
        const wcY = comY / (GH || 1);
        const sp = window.sandpipePhysics;
        sp.insideLeft = s[0]; sp.insideRight = s[1]; sp.insideTotal = s[4];
        sp.sandCoM.x = comX; sp.sandCoM.y = comY;
        sp.loadBalance = (s[0] + s[1]) > 0 ? s[1] / (s[0] + s[1]) : 0.5;
        sp.weightCenterY = wcY;
        sp.contactTop = s[5]; sp.contactBottom = s[6];
        sp.contactLeft = s[7]; sp.contactRight = s[8];
        sp.outsideTotal = s[9];
        sp.insideBottomQuarter = s[10]; sp.insideTopQuarter = s[11];
        sp.bodyVelX = bodyVelX; sp.bodyVelY = bodyVelY;
        sp.bodyAngularVel = bodyAngularVel;
        sp.bodyCx = bodyCx; sp.bodyCy = bodyCy;
        sp.isSettled = Math.abs(wcY - prevWeightCenterY) < 0.005;
        sp.leanDirection = sp.loadBalance < 0.4 ? -1 : sp.loadBalance > 0.6 ? 1 : 0;
        prevWeightCenterY = wcY;
        // Per-person stats
        sp.persons = [];
        for (let p = 0; p < numPersons; p++) {
          const o = p * (statsSliceSize / 4); // offset in u32s
          const ps = personState[p] || {};
          const pTotal = allStats[o + 4] || 1;
          const pComY = (allStats[o + 3] / pTotal) / (GH || 1);
          const pLB = (allStats[o] + allStats[o + 1]) > 0 ? allStats[o + 1] / (allStats[o] + allStats[o + 1]) : 0.5;
          sp.persons.push({
            insideLeft: allStats[o], insideRight: allStats[o + 1],
            insideTotal: allStats[o + 4],
            sandCoM: { x: allStats[o + 2] / pTotal, y: allStats[o + 3] / pTotal },
            loadBalance: pLB, weightCenterY: pComY,
            contactTop: allStats[o + 5], contactBottom: allStats[o + 6],
            contactLeft: allStats[o + 7], contactRight: allStats[o + 8],
            outsideTotal: allStats[o + 9],
            insideBottomQuarter: allStats[o + 10], insideTopQuarter: allStats[o + 11],
            bodyVelX: ps.bodyVelX || 0, bodyVelY: ps.bodyVelY || 0,
            bodyAngularVel: ps.bodyAngularVel || 0,
            bodyCx: ps.bodyCx || 0, bodyCy: ps.bodyCy || 0,
          });
        }
        recordPhysicsFrame(currentFrame);
      }).catch(() => { statsReadbackBusy = false; });
    }
  } // end bakeInProgress guard

  // -- Render pass (with ping-pong trails) --
  if (!trailTexA || !trailTexB) createTrailTextures();

  device.queue.writeBuffer(gpuParamsBuf, 0, makeParamsBuf(0, gpuFrameSeed, 1));
  // TrailParams: [retention.rgba (4 floats), fx.xyzw (4 floats)]
  // retention per-channel: warm afterimages by letting R decay slower
  // than B, controlled by fxChromaTrails magnitude.
  const base = P.trailLen.val;
  const split = P.fxChromaTrails.val;
  const retR = Math.max(0, Math.min(0.999, base + split * 0.5));
  const retG = base;
  const retB = Math.max(0, Math.min(0.999, base - split * 0.5));
  device.queue.writeBuffer(trailParamsBuf, 0, new Float32Array([
    retR, retG, retB, 1.0,                           // retention
    P.fxZoom.val, P.fxTwirl.val, P.fxChromaAb.val, 0 // fx
  ]));

  const trailPrev = trailToggle === 0 ? trailTexA : trailTexB;
  const trailCurr = trailToggle === 0 ? trailTexB : trailTexA;

  const renderBG = device.createBindGroup({
    layout: renderPipeline.getBindGroupLayout(0),
    entries: [
      { binding: 0, resource: { buffer: gpuParamsBuf } },
      { binding: 1, resource: { buffer: gpuGridInA } },
      { binding: 2, resource: { buffer: gpuGridOutA } },
      { binding: 3, resource: { buffer: gpuMaskBuf } },
      { binding: 4, resource: trailPrev.createView() },
      { binding: 5, resource: trailSampler },
      { binding: 6, resource: { buffer: trailParamsBuf } },
    ],
  });

  const presentBG = device.createBindGroup({
    layout: presentPipeline.getBindGroupLayout(0),
    entries: [
      { binding: 0, resource: trailCurr.createView() },
      { binding: 1, resource: trailSampler },
      { binding: 2, resource: { buffer: trailParamsBuf } },
    ],
  });

  const enc = device.createCommandEncoder();

  // Pass 1 -> trailCurr
  {
    const rp = enc.beginRenderPass({
      colorAttachments: [{
        view: trailCurr.createView(),
        loadOp: 'clear', storeOp: 'store',
        clearValue: { r: 0, g: 0, b: 0, a: 0 },
      }],
    });
    rp.setPipeline(renderPipeline);
    rp.setBindGroup(0, renderBG);
    rp.draw(3);
    rp.end();
  }

  // Pass 2 -> canvas (composite bg + trailCurr)
  {
    const prp = enc.beginRenderPass({
      colorAttachments: [{
        view: gpuContext.getCurrentTexture().createView(),
        loadOp: 'clear', storeOp: 'store',
        clearValue: { r: 0.067, g: 0.067, b: 0.067, a: 1.0 },
      }],
    });
    prp.setPipeline(presentPipeline);
    prp.setBindGroup(0, presentBG);
    prp.draw(3);
    prp.end();
  }

  device.queue.submit([enc.finish()]);
  trailToggle = 1 - trailToggle;
}

// -- Main loop --
let fpsCount = 0, lastFpsTime = performance.now(), currentFps = 60;

function loop(time) {
  if (!lastTime) lastTime = time;
  const dt = Math.min(time - lastTime, 50);
  lastTime = time;

  if (playing) {
    frameAccum += dt * P.playSpeed.val;
    const frameTime = 1000 / FPS;
    while (frameAccum >= frameTime) {
      frameAccum -= frameTime;
      currentFrame = (currentFrame + 1) % gridMasks.length;
      onFrameChange();
    }
  } else if (currentFrame !== prevFrame) {
    onFrameChange();
  }

  if (!playing || currentFrame === prevFrame) {
    for (let p = 0; p < numPersons; p++) {
      const ps = personState[p];
      ps.bodyVelX *= P.inertiaDamp.val; ps.bodyVelY *= P.inertiaDamp.val; ps.bodyAngularVel *= P.inertiaDamp.val;
      if (Math.abs(ps.bodyVelX) < 0.1) ps.bodyVelX = 0;
      if (Math.abs(ps.bodyVelY) < 0.1) ps.bodyVelY = 0;
      if (Math.abs(ps.bodyAngularVel) < 0.01) ps.bodyAngularVel = 0;
    }
    bodyVelX *= P.inertiaDamp.val; bodyVelY *= P.inertiaDamp.val; bodyAngularVel *= P.inertiaDamp.val;
    if (Math.abs(bodyVelX) < 0.1) bodyVelX = 0;
    if (Math.abs(bodyVelY) < 0.1) bodyVelY = 0;
    if (Math.abs(bodyAngularVel) < 0.01) bodyAngularVel = 0;
  }

  // Run GPU physics + render (skip during bake — bake drives its own gpuFrame calls)
  if (!bakeInProgress) gpuFrame();

  // FPS counter
  fpsCount++;
  const now = performance.now();
  if (now - lastFpsTime >= 1000) {
    currentFps = fpsCount; fpsCount = 0; lastFpsTime = now;
    if (!bakeInProgress) countParticlesDebug();
  }

  // Info overlay — don't overwrite during bake (bake writes its own progress)
  if (!bakeInProgress) {
    const matLabel = mode === 'both' ? `${MAT_NAMES[insideMat]}/${MAT_NAMES[outsideMat]}` : (mode === 'outside' ? MAT_NAMES[outsideMat] : MAT_NAMES[insideMat]);
    const dbg = (typeof lastParticleCount === 'object' && lastParticleCount) ? ` | in:${lastParticleCount.in} out:${lastParticleCount.out} (inside-outside-mask:${lastParticleCount.inOutsideMask})` : '';
    const rec = physicsRecord ? ` | baked:${physicsRecordCount}/${TOTAL_FRAMES}` : '';
    const pLabel = numPersons > 1 ? ` | ${numPersons}p` : '';
    document.getElementById('info').textContent = `frame ${currentFrame}/${TOTAL_FRAMES} | ${matLabel} | ${currentFps}fps | ${GW}x${GH} | GPU${pLabel}${dbg}${rec}`;
  }

  requestAnimationFrame(loop);
}

// -- Particle diagnostic (async GPU readback once per second) --
let lastParticleCount = null;
let debugBusy = false;
async function countParticlesDebug() {
  if (debugBusy || !device || !gpuGridInA || !gpuGridOutA) return;
  debugBusy = true;
  const byteLen = GW * GH * 4;
  // gpuMaskBuf lacks COPY_SRC, so we read the mask from the CPU-side gridMasks array.
  const stage = device.createBuffer({ size: byteLen * 2, usage: GPUBufferUsage.COPY_DST | GPUBufferUsage.MAP_READ });
  const enc = device.createCommandEncoder();
  enc.copyBufferToBuffer(gpuGridInA,  0, stage, 0,       byteLen);
  enc.copyBufferToBuffer(gpuGridOutA, 0, stage, byteLen, byteLen);
  device.queue.submit([enc.finish()]);
  try {
    await stage.mapAsync(GPUMapMode.READ);
    const u32 = new Uint32Array(stage.getMappedRange());
    const gmask = gridMasks[currentFrame];
    const cells = GW * GH;
    let inCount = 0, outCount = 0, inOutsideMask = 0;
    for (let i = 0; i < cells; i++) {
      const m_in = u32[i] & 0xFF;
      const m_out = u32[cells + i] & 0xFF;
      if (m_in !== 0) { inCount++; if (gmask && !gmask[i]) inOutsideMask++; }
      if (m_out !== 0) outCount++;
    }
    lastParticleCount = { in: inCount, out: outCount, inOutsideMask };
    stage.unmap();
  } catch (e) { console.warn('[debug] readback failed', e); }
  stage.destroy();
  debugBusy = false;
}

// -- Resize for GPU --
function resizeGPU() {
  canvas.width = GW;
  canvas.height = GH;
  const UI_BOTTOM = 60, TOP_PAD = 8;
  const scaleX = window.innerWidth / GW;
  const scaleY = (window.innerHeight - UI_BOTTOM - TOP_PAD) / GH;
  const scale = Math.min(scaleX, scaleY);
  canvas.style.width = Math.floor(GW * scale) + 'px';
  canvas.style.height = Math.floor(GH * scale) + 'px';
  // Reconfigure WebGPU context for new canvas dimensions
  if (gpuContext && device) {
    gpuContext.configure({ device, format: canvasFormat, alphaMode: 'premultiplied' });
    // Trail ping-pong textures must match new canvas size
    createTrailTextures();
  }
}

// -- UI --
function stepFrame(dir) { playing = false; currentFrame = Math.max(0, Math.min(gridMasks.length - 1, currentFrame + dir)); }
function toggleP(key) { P[key].val = P[key].val ? 0 : 1; buildTuner(); }
function cycleVideoOpacity() { const vo = P.videoOpacity.val; if (vo > 0) { lastVideoOpacity = vo; P.videoOpacity.val = 0; } else { P.videoOpacity.val = lastVideoOpacity > 0 ? lastVideoOpacity : 0.5; } buildTuner(); }
function toggleTuner() { showTuner = !showTuner; document.getElementById('tuner').style.display = showTuner ? 'block' : 'none'; }

// Keys that affect physics export quality (highlighted in tuner)
const PHYSICS_EXPORT_KEYS = new Set([
  'rainRate', 'gravityIn', 'gravityOut', 'fillPctIn', 'fillPctOut',
  'itersIn', 'itersOut', 'cellSize', 'inertia', 'inertiaDamp',
]);

// Known-good values for physics export — calibrated for clean, consistent signals
const PHYSICS_EXPORT_PRESET = {
  rainRate: 0.30, gravityIn: 1.0, gravityOut: 1.0,
  fillPctIn: 0.65, fillPctOut: 0.70,
  itersIn: 2, itersOut: 6, cellSize: 4,
  inertia: 0.8, inertiaDamp: 0.85,
};

function applyPhysicsPreset() {
  for (const [key, val] of Object.entries(PHYSICS_EXPORT_PRESET)) {
    if (P[key]) P[key].val = val;
  }
  if (P.cellSize.val !== CELL) onCellSizeChange(P.cellSize.val);
  buildTuner();
}

function buildTuner() {
  const el = document.getElementById('tuner');
  el.innerHTML = '<h3>tuner</h3>';
  const MAT_BTNS = [ { m: 1, name: 'sand', sw: '#e0d8c0' }, { m: 2, name: 'water', sw: '#2860d0' }, { m: 3, name: 'smoke', sw: '#8888a0' }, { m: 4, name: 'fire', sw: '#ff6820' }, { m: 5, name: 'lava', sw: '#d04010' }, { m: 6, name: 'powder', sw: '#f4f0e8' } ];
  const FILL_BTNS = ['static', 'rain', 'empty'];
  function sideBlock(side) {
    const sec = document.createElement('div'); sec.className = 'section'; sec.textContent = side; el.appendChild(sec);
    const matRow = document.createElement('div'); matRow.className = 'mat-row'; matRow.id = `mat-row-${side}`;
    for (const b of MAT_BTNS) { const btn = document.createElement('button'); btn.dataset.mat = b.m; btn.innerHTML = `<span class="swatch" style="background:${b.sw}"></span>${b.name}`; btn.onclick = () => selectMat(side, b.m); matRow.appendChild(btn); }
    el.appendChild(matRow);
    const fillRow = document.createElement('div'); fillRow.className = 'mat-row'; fillRow.id = `fill-row-${side}`;
    for (const f of FILL_BTNS) { const btn = document.createElement('button'); btn.dataset.fill = f; btn.textContent = f; btn.onclick = () => setFillMode(side, f); fillRow.appendChild(btn); }
    el.appendChild(fillRow);
  }
  sideBlock('inside'); sideBlock('outside');
  const containerRow = document.createElement('div'); containerRow.className = 'mat-row';
  const containerBtn = document.createElement('button'); containerBtn.id = 'container-out-btn'; containerBtn.textContent = 'container'; containerBtn.onclick = toggleContainer;
  containerRow.appendChild(containerBtn); el.appendChild(containerRow);
  const groups = [
    { label: 'spawn', keys: ['fillPctIn', 'fillPctOut', 'rainRate', 'cellSize'] },
    { label: 'physics', keys: ['itersIn', 'itersOut', 'inertia', 'inertiaDamp', 'spin', 'reactRate', 'gravityIn', 'gravityOut', 'splashIn', 'splashOut'] },
    { label: 'visuals', keys: ['playSpeed', 'showMask', 'videoOpacity', 'trailLen'] },
    { label: 'vfx', keys: ['fxZoom', 'fxTwirl', 'fxChromaAb', 'fxChromaTrails'] },
    { label: 'ground', keys: ['groundPlane'] },
  ];
  for (const group of groups) {
    const section = document.createElement('div'); section.className = 'section'; section.textContent = group.label; el.appendChild(section);
    for (const key of group.keys) {
      const p = P[key]; if (!p) continue;
      const label = document.createElement('label');
      if (PHYSICS_EXPORT_KEYS.has(key)) label.className = 'physics-export';
      label.innerHTML = `${p.label} <input type="range" min="${p.min}" max="${p.max}" step="${p.step}" value="${p.val}" data-key="${key}"><span class="val">${p.val}</span>`;
      el.appendChild(label);
      const input = label.querySelector('input');
      input.addEventListener('input', (e) => { const newVal = parseFloat(e.target.value); p.val = newVal; label.querySelector('.val').textContent = newVal; if (key === 'cellSize') onCellSizeChange(newVal); });
    }
  }
  // Physics export preset button
  const presetSection = document.createElement('div'); presetSection.className = 'section'; presetSection.textContent = 'export'; el.appendChild(presetSection);
  const hint = document.createElement('div'); hint.className = 'physics-hint'; hint.textContent = 'highlighted params affect physics export'; el.appendChild(hint);
  const presetBtn = document.createElement('button'); presetBtn.className = 'physics-preset-btn'; presetBtn.textContent = 'apply physics preset'; presetBtn.onclick = applyPhysicsPreset; el.appendChild(presetBtn);
  const bakeBtn = document.createElement('button'); bakeBtn.className = 'physics-preset-btn'; bakeBtn.textContent = 'bake + export (p)'; bakeBtn.onclick = bakePhysics; bakeBtn.style.marginTop = '4px'; el.appendChild(bakeBtn);
  updateMatButtons();
}

document.addEventListener('keydown', (e) => {
  if (e.key === 't') toggleTuner();
  if (e.key === 'b') toggleP('showMask');
  if (e.key === 'v') cycleVideoOpacity();
  if (e.key === 'r') respawn();
  if (e.key === 'm') cycleMode();
  if (e.key === 'i') toggleInside();
  if (e.key === 'o') toggleOutside();
  if (e.key === 'x') toggleInteract();
  if (e.key === ' ') { e.preventDefault(); playing = !playing; }
  if (e.key === 'ArrowRight') stepFrame(1);
  if (e.key === 'ArrowLeft') stepFrame(-1);
  if (/^[1-6]$/.test(e.key)) { const matMap = { '1': MAT.SAND, '2': MAT.WATER, '3': MAT.SMOKE, '4': MAT.FIRE, '5': MAT.LAVA, '6': MAT.POWDER }; selectMat(e.shiftKey ? 'outside' : 'inside', matMap[e.key]); }
  if (e.key === 'e') setFillMode('inside', 'empty');
  if (e.key === 'f') setFillMode('inside', 'rain');
  if (e.key === 'g') setFillMode('inside', 'static');
  if (e.key === 'E') setFillMode('outside', 'empty');
  if (e.key === 'F') setFillMode('outside', 'rain');
  if (e.key === 'G') setFillMode('outside', 'static');
  if (e.key === 'c') toggleContainer();
  if (e.key === 'p') bakePhysics();
});

// -- Gallery (verbatim from original) --
function goToGallery() { location.href = location.pathname; }

async function loadGallery() {
  const grid = document.getElementById('gallery-grid');
  grid.innerHTML = '<div style="color:#555;padding:20px">loading...</div>';
  try {
    const resp = await fetch(API_BASE + '/videos'); const videos = await resp.json();
    grid.innerHTML = '';
    if (videos.length === 0) { grid.innerHTML = '<div style="color:#555;padding:20px">no videos yet</div>'; return; }
    for (const v of videos) {
      const card = document.createElement('div');
      card.className = 'gallery-card' + (v.status !== 'ready' ? ' processing' : '');
      if (v.status === 'ready' && v.thumbnail) {
        card.innerHTML = `<img class="thumb" src="${v.thumbnail}" loading="lazy"><div class="card-info"><div class="name">${v.name}</div><div class="meta">${v.totalFrames||'?'} frames</div></div>`;
        card.onclick = () => { location.search = '?video=' + v.name; };
      } else if (['extracting','running_sam2','queued'].includes(v.status)) {
        const pct = Math.round((v.progress||0)*100);
        card.innerHTML = `<div class="thumb-placeholder">${v.status}... ${pct}%</div><div class="card-info"><div class="name">${v.name}</div></div><div class="card-progress"><div class="card-progress-fill" style="width:${pct}%"></div></div>`;
        card.dataset.processingName = v.name;
      } else { continue; }
      grid.appendChild(card);
    }
    if (videos.some(v => ['extracting','running_sam2','queued'].includes(v.status))) setTimeout(pollProcessing, 3000);
  } catch (e) { grid.innerHTML = `<div style="color:#a55;padding:20px">Error: ${e.message}</div>`; }
}

async function pollProcessing() {
  const cards = document.querySelectorAll('.gallery-card[data-processing-name]');
  if (cards.length === 0) return;
  for (const card of cards) {
    try { const resp = await fetch(API_BASE + '/videos/' + card.dataset.processingName + '/status'); const st = await resp.json(); if (st.status === 'done') { loadGallery(); return; } } catch {}
  }
  setTimeout(pollProcessing, 3000);
}

// -- Upload --
let selectedFile = null;
function openUpload() { document.getElementById('upload-modal').classList.add('active'); selectedFile = null; document.getElementById('file-input').value = ''; document.getElementById('upload-name').value = ''; document.getElementById('selected-file').style.display = 'none'; document.getElementById('submit-upload-btn').disabled = true; document.getElementById('upload-status').style.display = 'none'; document.getElementById('upload-progress-bar').style.display = 'none'; }
function closeUpload() { document.getElementById('upload-modal').classList.remove('active'); }
document.getElementById('file-input').addEventListener('change', (e) => { if (e.target.files.length > 0) { selectedFile = e.target.files[0]; document.getElementById('selected-file').textContent = selectedFile.name; document.getElementById('selected-file').style.display = 'block'; document.getElementById('submit-upload-btn').disabled = false; } });
const dropZone = document.getElementById('drop-zone');
dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', (e) => { e.preventDefault(); dropZone.classList.remove('dragover'); if (e.dataTransfer.files.length > 0) { selectedFile = e.dataTransfer.files[0]; document.getElementById('selected-file').textContent = selectedFile.name; document.getElementById('selected-file').style.display = 'block'; document.getElementById('submit-upload-btn').disabled = false; } });

async function submitUpload() {
  if (!selectedFile) return;
  const statusEl = document.getElementById('upload-status');
  const progressFill = document.getElementById('upload-progress-fill');
  document.getElementById('submit-upload-btn').disabled = true;
  statusEl.textContent = 'uploading...'; statusEl.style.display = 'block';
  document.getElementById('upload-progress-bar').style.display = 'block';
  const formData = new FormData(); formData.append('file', selectedFile);
  const customName = document.getElementById('upload-name').value.trim();
  if (customName) formData.append('name', customName);
  const xhr = new XMLHttpRequest(); xhr.open('POST', API_BASE + '/upload');
  xhr.upload.onprogress = (e) => { if (e.lengthComputable) { progressFill.style.width = Math.round(e.loaded/e.total*100)+'%'; } };
  xhr.onload = () => { if (xhr.status === 200) { setTimeout(() => { closeUpload(); loadGallery(); }, 800); } else { statusEl.textContent = 'error'; document.getElementById('submit-upload-btn').disabled = false; } };
  xhr.onerror = () => { statusEl.textContent = 'network error'; document.getElementById('submit-upload-btn').disabled = false; };
  xhr.send(formData);
}
document.getElementById('upload-modal').addEventListener('click', (e) => { if (e.target === document.getElementById('upload-modal')) closeUpload(); });

// -- Boot --
async function main() {
  if (isGalleryMode) {
    document.getElementById('gallery').classList.add('active');
    document.body.classList.add('gallery-mode');
    document.getElementById('canvas').style.display = 'none';
    loadGallery();
  } else {
    document.getElementById('gallery').classList.remove('active');
    document.getElementById('controls').style.display = 'flex';
    document.getElementById('back-btn').style.display = 'block';
    document.getElementById('loading').style.display = 'flex';
    await loadConfig();
    // Override resize for GPU mode
    window.removeEventListener('resize', resize);
    window.addEventListener('resize', resizeGPU);
    resizeGPU();

    const gpuOk = await initGPU();
    if (!gpuOk) {
      console.warn('WebGPU unavailable, redirecting to CPU version');
      document.getElementById('loading').textContent = 'WebGPU unavailable — loading CPU version...';
      location.href = 'sandpipe-body.html' + location.search;
      return;
    }

    buildTuner();
    await loadMasks();
    respawn();
    requestAnimationFrame(loop);
  }
}
main();
</script>
